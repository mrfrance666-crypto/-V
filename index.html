<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV – Pavlo Pashkin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#1a3a5c;
  --teal:#2a7a6a;
  --teal-light:#3a9a87;
  --cream:#f7f5f0;
  --mid:#e8ede8;
  --text:#1c2b3a;
  --muted:#5a7080;
  --sidebar-w:68mm;
}
body{
  font-family:'Barlow',sans-serif;
  background:#cfd8dc;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 16px 40px;
  min-height:100vh;
}

/* TOOLBAR */
.toolbar{
  width:100%;
  max-width:794px;
  background:white;
  border-radius:40px;
  padding:10px 16px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.lang-btns{display:flex;gap:6px;flex-wrap:wrap;}
.lbtn{
  border:none;padding:7px 14px;border-radius:30px;
  font-size:.75rem;font-weight:600;cursor:pointer;
  background:#eef2f5;color:#3a5060;transition:.2s;
}
.lbtn.active{background:var(--navy);color:white;}
.action-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn-pdf{
  background:var(--teal);color:white;border:none;
  padding:8px 20px;border-radius:30px;
  font-weight:700;font-size:.82rem;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;
  transition:background .2s;
}
.btn-pdf:hover{background:var(--teal-light);}
.btn-edit-toggle{
  background:#eef2f5;border:none;padding:8px 16px;
  border-radius:30px;font-size:.78rem;font-weight:600;
  cursor:pointer;color:#3a5060;
}

/* EDITOR */
.editor-panel{
  width:100%;max-width:794px;
  background:white;border-radius:20px;padding:20px;
  margin-bottom:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.editor-grid{grid-template-columns:1fr;}}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:.7rem;font-weight:700;color:var(--navy);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg textarea{
  width:100%;padding:8px 12px;border:1.5px solid #d0dde5;
  border-radius:12px;font-family:inherit;font-size:.8rem;
  color:var(--text);transition:border .2s;
}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--teal);}
.arr-item{
  background:#f7fafa;border:1.5px solid #d8e8e5;
  border-radius:14px;padding:12px;margin-bottom:10px;
  position:relative;
}
.rm-btn{
  position:absolute;top:8px;right:10px;
  background:none;border:none;cursor:pointer;
  color:#c0392b;font-size:.9rem;
}
.btn-add{
  background:#f0f5f3;border:1.5px dashed #7aada0;
  padding:6px 14px;border-radius:30px;
  font-size:.74rem;font-weight:600;cursor:pointer;
  color:var(--teal);margin-top:4px;
}
.sec-label{font-size:.75rem;font-weight:800;color:var(--navy);
  text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;}

/* ===== A4 CV ===== */
.a4-wrap{
  width:794px;
  /* hauteur auto — s'adapte au contenu */
  background:white;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
  display:flex;
  overflow:hidden;
}

/* Colonne gauche */
.cv-sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:var(--navy);
  color:white;
  display:flex;
  flex-direction:column;
  padding:0;
}
.sidebar-top{
  background:var(--teal);
  padding:22px 16px 18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.cv-photo{
  width:72px;height:72px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid white;
  background:#2a5a4a;
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;overflow:hidden;
  flex-shrink:0;
}
.cv-photo img{width:100%;height:100%;object-fit:cover;}
.cv-name-block{text-align:center;}
.cv-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.22rem;font-weight:800;
  color:white;line-height:1.1;
  letter-spacing:.5px;
  word-break:break-word;
}
.cv-subtitle{
  font-size:.65rem;font-weight:500;
  color:rgba(255,255,255,.75);margin-top:3px;
  letter-spacing:.4px;
}

.sidebar-body{padding:14px 14px;}
.sb-section{margin-bottom:14px;}
.sb-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.72rem;font-weight:700;
  color:var(--teal-light);
  text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid rgba(255,255,255,.15);
  padding-bottom:4px;margin-bottom:8px;
}
.sb-contact{
  display:flex;align-items:flex-start;gap:8px;
  font-size:.65rem;color:rgba(255,255,255,.88);
  margin-bottom:6px;line-height:1.35;
  word-break:break-all;
}
.sb-contact i{
  color:var(--teal-light);font-size:.62rem;
  margin-top:2px;flex-shrink:0;width:11px;
}
.sb-text{font-size:.63rem;color:rgba(255,255,255,.8);line-height:1.45;margin-bottom:4px;}
.lang-item{margin-bottom:5px;}
.lang-name{font-size:.65rem;font-weight:600;color:white;margin-bottom:2px;}
.lang-bar{height:3px;background:rgba(255,255,255,.18);border-radius:2px;overflow:hidden;}
.lang-fill{height:100%;border-radius:2px;background:var(--teal-light);}
.hobby-tag{
  display:inline-block;background:rgba(255,255,255,.12);
  border-radius:10px;padding:2px 8px;font-size:.6rem;
  color:rgba(255,255,255,.85);margin:2px 2px 0 0;
}

/* Colonne droite */
.cv-main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:0;
  overflow:hidden;
}
.cv-main-top{
  background:var(--cream);
  padding:14px 18px 12px;
  border-bottom:2px solid var(--mid);
}
.stage-box{
  background:white;
  border-left:4px solid var(--teal);
  padding:8px 14px;
  border-radius:0 10px 10px 0;
  display:inline-flex;flex-direction:column;gap:2px;
}
.stage-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.9rem;font-weight:800;
  color:var(--navy);letter-spacing:.4px;
}
.stage-dates{font-size:.68rem;color:var(--muted);font-weight:500;}
.stage-poste{font-size:.72rem;font-weight:700;color:var(--teal);}

.cv-main-body{padding:12px 18px 14px;}
.cv-section{margin-bottom:12px;}
.cv-sec-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.82rem;font-weight:800;
  color:var(--navy);text-transform:uppercase;
  letter-spacing:1px;
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;
}
.cv-sec-title::after{
  content:'';flex:1;height:1.5px;background:var(--mid);
}
.cv-sec-title i{color:var(--teal);font-size:.75rem;}

.skills-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px;}
.skill-tag{
  background:#eef5f3;color:var(--navy);
  border:1px solid #c8ddd8;
  padding:3px 10px;border-radius:20px;
  font-size:.6rem;font-weight:600;
}

.job{margin-bottom:8px;}
.job-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.job-title{
  font-size:.72rem;font-weight:700;color:var(--navy);
  line-height:1.25;flex:1;
}
.job-date{
  font-size:.6rem;color:var(--teal);font-weight:600;
  white-space:nowrap;background:#eef5f3;
  padding:2px 7px;border-radius:10px;flex-shrink:0;
}
.job-company{font-size:.63rem;color:var(--muted);font-weight:500;margin:1px 0;}
.job-desc{font-size:.62rem;color:#3a5060;line-height:1.4;margin-top:2px;}

.edu{margin-bottom:7px;}
.edu-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.edu-degree{font-size:.7rem;font-weight:700;color:var(--navy);flex:1;line-height:1.25;}
.edu-year{font-size:.6rem;color:var(--teal);font-weight:600;white-space:nowrap;background:#eef5f3;padding:2px 7px;border-radius:10px;flex-shrink:0;}
.edu-place{font-size:.62rem;color:var(--muted);margin-top:1px;}

/* Mobile */
@media(max-width:820px){
  .a4-wrap{width:100%;max-width:794px;}
  :root{--sidebar-w:58mm;}
}
@media(max-width:500px){
  .a4-wrap{flex-direction:column;}
  :root{--sidebar-w:100%;}
  .cv-sidebar{width:100%;}
  body{padding:10px 8px 30px;}
  .toolbar{flex-direction:column;align-items:stretch;}
  .lang-btns{justify-content:center;}
  .action-row{justify-content:center;}
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="lang-btns">
    <button class="lbtn" data-lang="fr">Français</button>
    <button class="lbtn" data-lang="en">English</button>
    <button class="lbtn" data-lang="uk">Українська</button>
    <button class="lbtn" data-lang="ru">Русский</button>
  </div>
  <div class="action-row">
    <button class="btn-edit-toggle" id="toggleEdit">✏️ Éditeur</button>
    <button class="btn-pdf" id="dlPDF"><i class="fas fa-file-pdf"></i> PDF A4</button>
  </div>
</div>

<div class="editor-panel" id="editorPanel" style="display:none;">
  <div class="editor-grid">
    <div>
      <div class="fg"><label>📷 Photo</label><input type="file" id="photoUpload" accept="image/*"></div>
      <div class="fg"><label>Nom complet</label><input type="text" id="fullname" value="Pavlo Pashkin"></div>
      <div class="fg"><label>Sous-titre</label><input type="text" id="subtitle" value="Technicien Polyvalent · Logisticien"></div>
      <div class="fg"><label>Téléphone</label><input type="text" id="phone" value="07 45 62 50 07"></div>
      <div class="fg"><label>Email</label><input type="text" id="email" value="contact@paulmultiservice.fr"></div>
      <div class="fg"><label>Adresse</label><input type="text" id="address" value="Rennes, France"></div>
      <div class="fg"><label>Permis</label><input type="text" id="license" value="Permis B, Véhicule"></div>
      <div class="fg"><label>Site web</label><input type="text" id="website" value="paulmultiservice.fr"></div>
      <div class="fg"><label>Loisirs (virgules)</label><input type="text" id="hobbies" value="Football, Boxe thaïlandaise, Nouvelles technologies"></div>
    </div>
    <div>
      <div class="fg"><label>Titre stage / poste recherché</label><input type="text" id="stageTitle" value="Recherche un stage"></div>
      <div class="fg"><label>Du</label><input type="text" id="stageStart" value="29/06/2026"></div>
      <div class="fg"><label>Au</label><input type="text" id="stageEnd" value="17/07/2026"></div>
      <div class="fg"><label>Poste</label><input type="text" id="stagePoste" value="Stagiaire CLPS"></div>
      <div class="fg"><label>Compétences (virgules)</label><textarea id="skills" rows="3">Petit bricolage, Maintenance technique, Conseil informatique, Assistance technique, Gestion des flux logistiques, Développement Web (HTML/JS), Pack Office (Excel avancé), Maintenance PC/Mac/iPhone, Management d'équipe, Gestion de crise</textarea></div>
      <div class="sec-label">Langues</div>
      <div id="langList"></div>
      <button class="btn-add" id="addLangBtn">+ Langue</button>
    </div>
  </div>
  <div class="editor-grid" style="margin-top:14px;">
    <div>
      <div class="sec-label">Expériences</div>
      <div id="expList"></div>
      <button class="btn-add" id="addExpBtn">+ Expérience</button>
    </div>
    <div>
      <div class="sec-label">Formations</div>
      <div id="eduList"></div>
      <button class="btn-add" id="addEduBtn">+ Formation</button>
    </div>
  </div>
</div>

<div id="cvWrap">
<!-- CV généré ici -->
</div>

<script>
const T = {
  fr:{contact:"Coordonnées",lang:"Langues",loisir:"Loisirs",comp:"Compétences",exp:"Expériences professionnelles",edu:"Formations & Diplômes"},
  en:{contact:"Contact",lang:"Languages",loisir:"Hobbies",comp:"Skills",exp:"Work Experience",edu:"Education & Degrees"},
  uk:{contact:"Контакти",lang:"Мови",loisir:"Хобі",comp:"Навички",exp:"Досвід роботи",edu:"Освіта та дипломи"},
  ru:{contact:"Контакты",lang:"Языки",loisir:"Хобби",comp:"Навыки",exp:"Опыт работы",edu:"Образование и дипломы"}
};

let lang = "fr";
let photo = "";

let langs = [
  {name:"Ukrainien", level:100},
  {name:"Russe", level:100},
  {name:"Français", level:55},
  {name:"Anglais (notions)", level:30}
];

let exps = [
  {title:"Chef d'Entreprise – PaulMultiService", company:"Rennes", period:"02/2026 – En cours", desc:"Conseil informatique, assistance technique, petit bricolage. Conception et déploiement du site paulmultiservice.fr. Gestion administrative, comptabilité, relation client."},
  {title:"Officier Logisticien – Chef de Bureau des Transports", company:"Service des Transports Militaires, Ukraine", period:"2023 – 2024", desc:"Planification et optimisation des flux de transport à grande échelle. Management d'une unité opérationnelle et gestion de crise sous haute pression."},
  {title:"Élève-officier / Cadet Logisticien", company:"Académie Militaire – Forces Armées", period:"2019 – 2023", desc:"Formation militaire de commandement. Gestion des flux logistiques, régulation des transports, management d'équipe. Discipline de fer et exécution des ordres en environnements exigeants."},
  {title:"Formation militaire et opérationnelle", company:"Forces Armées de l'Ukraine", period:"2018 – 2019", desc:"Sécurisation et protection des infrastructures stratégiques. Déploiement en zone de combat (ATO/OOS). Statut d'Ancien Combattant."}
];

let edus = [
  {degree:"Formation Prépa Avenir FLE", institution:"CLPS Rennes", year:"2026 (En cours)"},
  {degree:"Licence (Bac+3) – Technologies de Transport", institution:"Université d'État des Sciences et Technologies d'Ukraine", year:"2023 – Mention / Diplôme Rouge"},
  {degree:"Diplôme Professionnel – Opérateur Informatique & Comptabilité", institution:"Collège Prof. de l'Université Nationale de l'Aviation", year:"2016"}
];

function h(s){if(!s)return'';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);}

function renderCV(){
  const t = T[lang];
  const name    = document.getElementById('fullname').value;
  const sub     = document.getElementById('subtitle').value;
  const phone   = document.getElementById('phone').value;
  const email   = document.getElementById('email').value;
  const addr    = document.getElementById('address').value;
  const lic     = document.getElementById('license').value;
  const web     = document.getElementById('website').value;
  const hobs    = document.getElementById('hobbies').value.split(',').map(s=>s.trim()).filter(Boolean);
  const stT     = document.getElementById('stageTitle').value;
  const stS     = document.getElementById('stageStart').value;
  const stE     = document.getElementById('stageEnd').value;
  const stP     = document.getElementById('stagePoste').value;
  const skills  = document.getElementById('skills').value.split(',').map(s=>s.trim()).filter(Boolean);

  let cv = `<div class="a4-wrap">`;

  // ── SIDEBAR ──
  cv += `<div class="cv-sidebar">`;
  cv += `<div class="sidebar-top">`;
  if(photo){
    cv += `<div class="cv-photo"><img src="${photo}" alt="photo"></div>`;
  } else {
    cv += `<div class="cv-photo">👤</div>`;
  }
  cv += `<div class="cv-name-block"><div class="cv-name">${h(name)||'Pavlo Pashkin'}</div>`;
  if(sub) cv += `<div class="cv-subtitle">${h(sub)}</div>`;
  cv += `</div></div>`;

  cv += `<div class="sidebar-body">`;

  // Contact
  cv += `<div class="sb-section"><div class="sb-title">${t.contact}</div>`;
  if(phone) cv+=`<div class="sb-contact"><i class="fas fa-phone-alt"></i><span>${h(phone)}</span></div>`;
  if(email) cv+=`<div class="sb-contact"><i class="fas fa-envelope"></i><span>${h(email)}</span></div>`;
  if(addr)  cv+=`<div class="sb-contact"><i class="fas fa-map-marker-alt"></i><span>${h(addr)}</span></div>`;
  if(lic)   cv+=`<div class="sb-contact"><i class="fas fa-car"></i><span>${h(lic)}</span></div>`;
  if(web)   cv+=`<div class="sb-contact"><i class="fas fa-globe"></i><span>${h(web)}</span></div>`;
  cv += `</div>`;

  // Langues
  if(langs.length){
    cv += `<div class="sb-section"><div class="sb-title">${t.lang}</div>`;
    langs.forEach(l=>{
      cv+=`<div class="lang-item"><div class="lang-name">${h(l.name)}</div><div class="lang-bar"><div class="lang-fill" style="width:${l.level}%"></div></div></div>`;
    });
    cv += `</div>`;
  }

  // Loisirs
  if(hobs.length){
    cv += `<div class="sb-section"><div class="sb-title">${t.loisir}</div><div>`;
    hobs.forEach(hb => cv+=`<span class="hobby-tag">${h(hb)}</span>`);
    cv += `</div></div>`;
  }

  cv += `</div></div>`; // sidebar-body + cv-sidebar

  // ── MAIN ──
  cv += `<div class="cv-main">`;
  cv += `<div class="cv-main-top">`;
  cv += `<div class="stage-box">`;
  cv += `<div class="stage-title">${h(stT)||'Recherche un stage'}</div>`;
  cv += `<div class="stage-dates">Du ${h(stS)} au ${h(stE)}</div>`;
  cv += `<div class="stage-poste">${h(stP)}</div>`;
  cv += `</div></div>`;

  cv += `<div class="cv-main-body">`;

  // Skills
  if(skills.length){
    cv += `<div class="cv-section"><div class="cv-sec-title"><i class="fas fa-cogs"></i>${t.comp}</div>`;
    cv += `<div class="skills-wrap">`;
    skills.forEach(s=>cv+=`<span class="skill-tag">${h(s)}</span>`);
    cv += `</div></div>`;
  }

  // Expériences
  if(exps.length){
    cv += `<div class="cv-section"><div class="cv-sec-title"><i class="fas fa-briefcase"></i>${t.exp}</div>`;
    exps.forEach(e=>{
      cv += `<div class="job"><div class="job-head"><div class="job-title">${h(e.title)}</div><div class="job-date">${h(e.period)}</div></div>`;
      if(e.company) cv+=`<div class="job-company">${h(e.company)}</div>`;
      if(e.desc)    cv+=`<div class="job-desc">${h(e.desc)}</div>`;
      cv += `</div>`;
    });
    cv += `</div>`;
  }

  // Formations
  if(edus.length){
    cv += `<div class="cv-section"><div class="cv-sec-title"><i class="fas fa-graduation-cap"></i>${t.edu}</div>`;
    edus.forEach(e=>{
      cv += `<div class="edu"><div class="edu-head"><div class="edu-degree">${h(e.degree)}</div><div class="edu-year">${h(e.year)}</div></div>`;
      if(e.institution) cv+=`<div class="edu-place">${h(e.institution)}</div>`;
      cv += `</div>`;
    });
    cv += `</div>`;
  }

  cv += `</div></div></div>`; // cv-main-body, cv-main, a4-wrap
  document.getElementById('cvWrap').innerHTML = cv;
}

// ── EDITOR FORMS ──
function renderExpForm(){
  const c = document.getElementById('expList'); c.innerHTML='';
  exps.forEach((e,i)=>{
    const d=document.createElement('div'); d.className='arr-item';
    d.innerHTML=`<button class="rm-btn" data-t="exp" data-i="${i}">🗑</button>
      <div class="fg"><label>Titre</label><input class="e-f" data-t="exp" data-i="${i}" data-k="title" value="${h(e.title)}"></div>
      <div class="fg"><label>Lieu / Structure</label><input class="e-f" data-t="exp" data-i="${i}" data-k="company" value="${h(e.company)}"></div>
      <div class="fg"><label>Période</label><input class="e-f" data-t="exp" data-i="${i}" data-k="period" value="${h(e.period)}"></div>
      <div class="fg"><label>Description</label><textarea class="e-f" data-t="exp" data-i="${i}" data-k="desc" rows="2">${h(e.desc)}</textarea></div>`;
    c.appendChild(d);
  });
  bindFieldEvents();
}
function renderEduForm(){
  const c = document.getElementById('eduList'); c.innerHTML='';
  edus.forEach((e,i)=>{
    const d=document.createElement('div'); d.className='arr-item';
    d.innerHTML=`<button class="rm-btn" data-t="edu" data-i="${i}">🗑</button>
      <div class="fg"><label>Diplôme</label><input class="e-f" data-t="edu" data-i="${i}" data-k="degree" value="${h(e.degree)}"></div>
      <div class="fg"><label>Établissement</label><input class="e-f" data-t="edu" data-i="${i}" data-k="institution" value="${h(e.institution)}"></div>
      <div class="fg"><label>Année</label><input class="e-f" data-t="edu" data-i="${i}" data-k="year" value="${h(e.year)}"></div>`;
    c.appendChild(d);
  });
  bindFieldEvents();
}
function renderLangForm(){
  const c = document.getElementById('langList'); c.innerHTML='';
  langs.forEach((l,i)=>{
    const d=document.createElement('div'); d.className='arr-item';
    d.innerHTML=`<button class="rm-btn" data-t="lang" data-i="${i}">🗑</button>
      <div class="fg"><label>Langue</label><input class="e-f" data-t="lang" data-i="${i}" data-k="name" value="${h(l.name)}"></div>
      <div class="fg"><label>Niveau % (0-100)</label><input type="number" class="e-f" data-t="lang" data-i="${i}" data-k="level" value="${l.level}" min="0" max="100"></div>`;
    c.appendChild(d);
  });
  bindFieldEvents();
}
function bindFieldEvents(){
  document.querySelectorAll('.e-f').forEach(el=>{
    el.oninput=e=>{
      const t=el.dataset.t, i=parseInt(el.dataset.i), k=el.dataset.k;
      if(t==='exp') exps[i][k]=el.value;
      else if(t==='edu') edus[i][k]=el.value;
      else if(t==='lang') langs[i][k]= k==='level'?parseInt(el.value)||0 : el.value;
      renderCV();
    };
  });
  document.querySelectorAll('.rm-btn').forEach(btn=>{
    btn.onclick=()=>{
      const t=btn.dataset.t,i=parseInt(btn.dataset.i);
      if(t==='exp'){exps.splice(i,1);renderExpForm();}
      else if(t==='edu'){edus.splice(i,1);renderEduForm();}
      else if(t==='lang'){langs.splice(i,1);renderLangForm();}
      renderCV();
    };
  });
}

// ── PDF A4 ──
document.getElementById('dlPDF').addEventListener('click', async()=>{
  const btn=document.getElementById('dlPDF');
  const orig=btn.innerHTML;
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>';
  btn.disabled=true;
  try{
    const el=document.querySelector('.a4-wrap');
    const W=794, H=el.offsetHeight;
    const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',width:W,height:H});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    const pW=210, pH=297;
    const ratio=Math.min(pW/(W/3.7795),pH/(H/3.7795));
    const iW=(W/3.7795)*ratio, iH=(H/3.7795)*ratio;
    const x=(pW-iW)/2, y=(pH-iH)/2;
    pdf.addImage(canvas,'PNG',x,y,iW,iH);
    pdf.save('CV_Pavlo_Pashkin.pdf');
  }catch(e){alert('Erreur PDF: '+e);}
  finally{btn.innerHTML=orig;btn.disabled=false;}
});

</script>
