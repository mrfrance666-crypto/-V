<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CV - Pavlo Pashkin (responsive)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #eef2f8;
            font-family: 'Inter', sans-serif;
            padding: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Панель инструментов */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: white;
            padding: 10px 16px;
            border-radius: 40px;
            margin-bottom: 20px;
        }
        .lang-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: #f0f2f5;
            border: none;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .lang-btn.active {
            background: #1f4870;
            color: white;
        }
        .btn-pdf {
            background: #1f4870;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        /* Редактор */
        .editor {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .editor-column {
            flex: 1;
            min-width: 240px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.75rem;
            display: block;
            margin-bottom: 4px;
            color: #2c3e4e;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 20px;
            border: 1px solid #cfdfed;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .array-item {
            background: #fafcff;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid #e9f0f5;
        }
        .remove-item {
            background: none;
            border: none;
            color: #c0392b;
            float: right;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-add {
            background: #eff3f8;
            border: 1px dashed #8ba3bc;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 5px;
        }
        hr { margin: 16px 0; }

        /* СТИЛИ CV — адаптивные */
        .cv {
            background: white;
            max-width: 100%;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .cv-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 25px;
            background: #f8fbfe;
            border-bottom: 3px solid #2a6f6f;
            flex-wrap: wrap;
        }
        .cv-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #2a6f6f;
            background: #eef2f8;
        }
        .cv-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1f4870;
            word-break: break-word;
        }
        .cv-two-cols {
            display: flex;
            flex-wrap: wrap;
        }
        .cv-left {
            flex: 1;
            min-width: 250px;
            background: #fafcff;
            padding: 20px;
            border-right: 1px solid #e2edf5;
        }
        .cv-right {
            flex: 2;
            min-width: 280px;
            padding: 20px;
        }
        .cv-left-title {
            font-weight: 800;
            font-size: 1rem;
            color: #1f4870;
            border-bottom: 2px solid #2a6f6f;
            display: inline-block;
            margin: 0 0 12px 0;
        }
        .cv-contact {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            word-break: break-word;
        }
        .cv-contact i {
            width: 22px;
            color: #2a6f6f;
        }
        .cv-text {
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        .cv-section-title {
            font-weight: 800;
            font-size: 1rem;
            color: #1f4a6e;
            border-left: 4px solid #2a6f6f;
            padding-left: 12px;
            margin: 0 0 12px 0;
        }
        .cv-stage {
            background: #eef3fa;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .cv-stage p {
            margin: 4px 0;
        }
        .cv-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .cv-skill {
            background: #e6f0f5;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .cv-job {
            margin-bottom: 16px;
        }
        .cv-job-title {
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }
        .cv-job-date {
            font-weight: 400;
            color: #5f7d9c;
            font-size: 0.75rem;
        }
        .cv-job-desc {
            font-size: 0.75rem;
            color: #2c4a6e;
            margin-top: 4px;
            line-height: 1.35;
        }
        .cv-edu {
            margin-bottom: 14px;
        }
        .cv-edu-title {
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }
        .cv-edu-date {
            font-weight: 400;
            color: #5f7d9c;
            font-size: 0.75rem;
        }
        .cv-edu-place {
            font-size: 0.75rem;
            color: #4a627a;
            margin-top: 2px;
        }

        /* Адаптация для телефонов */
        @media (max-width: 700px) {
            body { padding: 12px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .lang-buttons { justify-content: center; }
            .btn-pdf { justify-content: center; }
            .editor { padding: 16px; }
            .cv-header { flex-direction: column; text-align: center; }
            .cv-name { font-size: 1.5rem; }
            .cv-left, .cv-right { border-right: none; }
            .cv-left { border-bottom: 1px solid #e2edf5; margin-bottom: 10px; }
        }
        /* Для очень маленьких экранов */
        @media (max-width: 480px) {
            .cv-photo { width: 70px; height: 70px; }
            .cv-name { font-size: 1.2rem; }
            .form-group input, .form-group textarea { font-size: 0.8rem; padding: 8px 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <div class="lang-buttons">
            <button class="lang-btn" data-lang="fr">Français</button>
            <button class="lang-btn" data-lang="en">English</button>
            <button class="lang-btn" data-lang="uk">Українська</button>
            <button class="lang-btn" data-lang="ru">Русский</button>
        </div>
        <button class="btn-pdf" id="downloadPDF"><i class="fas fa-download"></i> PDF (A4)</button>
    </div>

    <div class="editor">
        <div class="editor-column">
            <div class="form-group"><label>📷 Photo</label><input type="file" id="photoUpload"></div>
            <div class="form-group"><label>Nom</label><input type="text" id="fullname" value="Pavlo Pashkin"></div>
            <div class="form-group"><label>Téléphone</label><input type="text" id="phone" value="07 45 62 50 07"></div>
            <div class="form-group"><label>Email</label><input type="text" id="email" value="contact@paulmultiservice.fr"></div>
            <div class="form-group"><label>Adresse</label><input type="text" id="address" value="Rennes, France"></div>
            <div class="form-group"><label>Permis</label><input type="text" id="license" value="Permis B, Véhicule"></div>
            <div class="form-group"><label>Site web</label><input type="text" id="website" value="paulmultiservice.fr"></div>
            <div><label><input type="checkbox" id="hideWebsite"> Masquer le site</label></div>
            <div class="form-group"><label>Langues</label><input type="text" id="languages" value="Ukrainien (maternel), Russe (bilingue), Français (A2-B1)"></div>
            <div class="form-group"><label>Loisirs</label><input type="text" id="hobbies" value="Football, Boxe, Nouvelles technologies"></div>
        </div>
        <div class="editor-column">
            <div class="form-group"><label>Titre du stage</label><input type="text" id="stageTitle" value="Recherche un stage"></div>
            <div class="form-group"><label>Date début</label><input type="text" id="stageStart" value="29/06/2026"></div>
            <div class="form-group"><label>Date fin</label><input type="text" id="stageEnd" value="17/07/2026"></div>
            <div class="form-group"><label>Poste</label><input type="text" id="stagePoste" value="Stagiaire CLPS"></div>
            <div class="form-group"><label>Compétences (virgules)</label><textarea id="skills" rows="3">Petit bricolage, Maintenance technique, Conseil informatique, Assistance technique, Gestion des flux logistiques, Développement Web (HTML/JS), Pack Office, Management d'équipe, Gestion de crise</textarea></div>
            <div class="form-group"><label>Expériences</label></div>
            <div id="expList"></div>
            <button class="btn-add" id="addExpBtn">+ Ajouter expérience</button>
            <div class="form-group"><label>Formations</label></div>
            <div id="eduList"></div>
            <button class="btn-add" id="addEduBtn">+ Ajouter formation</button>
        </div>
    </div>

    <div id="cvPreview"></div>
</div>

<script>
    let experiences = [
        { title: "Chef d'Entreprise - PaulMultiService", company: "Rennes", period: "02/2026 - En cours", desc: "Conseil informatique, assistance technique, petit bricolage. Développement du site paulmultiservice.fr. Gestion administrative, comptabilité, relation client." },
        { title: "Officier Logisticien - Chef de Bureau des Transports", company: "Service des Transports Militaires (Ukraine)", period: "2023-2024", desc: "Planification et optimisation des flux de transport à grande échelle. Management d'une unité opérationnelle et gestion de crise." },
        { title: "Élève-officier / Cadet Logisticien", company: "Académie Militaire / Forces Armées", period: "2019-2023", desc: "Formation militaire, gestion des flux logistiques, régulation des transports, management d'équipe." },
        { title: "Formation militaire et opérationnelle", company: "Forces Armées de l'Ukraine", period: "2018-2019", desc: "Sécurisation, protection des infrastructures, déploiement en zone de combat (ATO/OOS). Statut d'Ancien Combattant." }
    ];
    let educations = [
        { degree: "Formation Prépa Avenir FL", institution: "CLPS Rennes", year: "2026 (En cours)" },
        { degree: "Licence (Bac+3) - Technologies de Transport", institution: "Université d'État des Sciences et Technologies d'Ukraine", year: "2023 (Mention / Diplôme Rouge)" },
        { degree: "Diplôme Professionnel – Opérateur Informatique & Comptabilité", institution: "Collège Professionnel de l'Université Nationale de l'Aviation", year: "2016" }
    ];

    let photoBase64 = "";
    let currentLang = "fr";

    const texts = {
        fr: { contact:"Coordonnées", lang:"Langues", loisir:"Loisirs", comp:"COMPÉTENCES", exp:"EXPÉRIENCES PROFESSIONNELLES", edu:"FORMATIONS / DIPLÔMES" },
        en: { contact:"Contact", lang:"Languages", loisir:"Hobbies", comp:"SKILLS", exp:"WORK EXPERIENCE", edu:"EDUCATION / DEGREES" },
        uk: { contact:"Контакти", lang:"Мови", loisir:"Хобі", comp:"НАВИЧКИ", exp:"ДОСВІД РОБОТИ", edu:"ОСВІТА / ДИПЛОМИ" },
        ru: { contact:"Контакты", lang:"Языки", loisir:"Хобби", comp:"НАВЫКИ", exp:"ОПЫТ РАБОТЫ", edu:"ОБРАЗОВАНИЕ / ДИПЛОМЫ" }
    };

    function renderPreview() {
        const t = texts[currentLang];
        const fullname = document.getElementById('fullname').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const address = document.getElementById('address').value;
        const license = document.getElementById('license').value;
        let website = document.getElementById('website').value;
        if(document.getElementById('hideWebsite').checked) website = "";
        const languages = document.getElementById('languages').value;
        const hobbies = document.getElementById('hobbies').value;
        const stageTitle = document.getElementById('stageTitle').value;
        const stageStart = document.getElementById('stageStart').value;
        const stageEnd = document.getElementById('stageEnd').value;
        const stagePoste = document.getElementById('stagePoste').value;
        const skillsRaw = document.getElementById('skills').value;
        const skills = skillsRaw.split(',').map(s=>s.trim()).filter(s=>s);

        let html = `<div class="cv">`;
        html += `<div class="cv-header">`;
        if(photoBase64) html += `<img src="${photoBase64}" class="cv-photo">`;
        else html += `<div class="cv-photo" style="display:flex; align-items:center; justify-content:center; background:#eef2f8;">📷</div>`;
        html += `<div class="cv-name">${escapeHtml(fullname) || "Pavlo Pashkin"}</div>`;
        html += `</div>`;
        html += `<div class="cv-two-cols">`;
        // gauche
        html += `<div class="cv-left">`;
        html += `<div class="cv-left-title">${t.contact}</div>`;
        if(phone) html += `<div class="cv-contact"><i class="fas fa-phone-alt"></i> ${escapeHtml(phone)}</div>`;
        if(email) html += `<div class="cv-contact"><i class="fas fa-envelope"></i> ${escapeHtml(email)}</div>`;
        if(address) html += `<div class="cv-contact"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(address)}</div>`;
        if(license) html += `<div class="cv-contact"><i class="fas fa-car"></i> ${escapeHtml(license)}</div>`;
        if(website) html += `<div class="cv-contact"><i class="fas fa-globe"></i> ${escapeHtml(website)}</div>`;
        if(languages) {
            html += `<div class="cv-left-title">${t.lang}</div>`;
            html += `<div class="cv-text">${escapeHtml(languages)}</div>`;
        }
        if(hobbies) {
            html += `<div class="cv-left-title">${t.loisir}</div>`;
            html += `<div class="cv-text">${escapeHtml(hobbies)}</div>`;
        }
        html += `</div>`;
        // droite
        html += `<div class="cv-right">`;
        html += `<div class="cv-stage"><strong>${escapeHtml(stageTitle) || "Recherche un stage"}</strong><p>Du ${escapeHtml(stageStart)} au ${escapeHtml(stageEnd)}</p><p><strong>${escapeHtml(stagePoste) || "Stagiaire CLPS"}</strong></p></div>`;
        if(skills.length) {
            html += `<div class="cv-section-title">${t.comp}</div><div class="cv-skills">`;
            skills.forEach(s => html += `<span class="cv-skill">${escapeHtml(s)}</span>`);
            html += `</div>`;
        }
        if(experiences.length) {
            html += `<div class="cv-section-title">${t.exp}</div>`;
            experiences.forEach(exp => {
                html += `<div class="cv-job"><div class="cv-job-title"><span>${escapeHtml(exp.title)} - ${escapeHtml(exp.company)}</span><span class="cv-job-date">${escapeHtml(exp.period)}</span></div>`;
                if(exp.desc) html += `<div class="cv-job-desc">${escapeHtml(exp.desc)}</div>`;
                html += `</div>`;
            });
        }
        if(educations.length) {
            html += `<div class="cv-section-title">${t.edu}</div>`;
            educations.forEach(edu => {
                html += `<div class="cv-edu"><div class="cv-edu-title"><span>${escapeHtml(edu.degree)}</span><span class="cv-edu-date">${escapeHtml(edu.year)}</span></div>`;
                if(edu.institution) html += `<div class="cv-edu-place">${escapeHtml(edu.institution)}</div>`;
                html += `</div>`;
            });
        }
        html += `</div></div></div>`;
        document.getElementById('cvPreview').innerHTML = html;
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    function renderExpForm() {
        const container = document.getElementById('expList');
        container.innerHTML = '';
        experiences.forEach((exp, idx) => {
            const div = document.createElement('div');
            div.className = 'array-item';
            div.innerHTML = `<button class="remove-item" data-type="exp" data-idx="${idx}">🗑️</button>
                <div class="form-group"><label>Titre</label><input class="exp-title" value="${escapeHtml(exp.title)}" data-idx="${idx}" data-field="title"></div>
                <div class="form-group"><label>Entreprise</label><input class="exp-company" value="${escapeHtml(exp.company)}" data-idx="${idx}" data-field="company"></div>
                <div class="form-group"><label>Période</label><input class="exp-period" value="${escapeHtml(exp.period)}" data-idx="${idx}" data-field="period"></div>
                <div class="form-group"><label>Description</label><textarea class="exp-desc" data-idx="${idx}" data-field="desc" rows="2">${escapeHtml(exp.desc)}</textarea></div>`;
            container.appendChild(div);
        });
        attachExpEvents();
    }
    function attachExpEvents() {
        document.querySelectorAll('.exp-title, .exp-company, .exp-period, .exp-desc').forEach(el => {
            el.addEventListener('input', (e) => {
                let idx = parseInt(e.target.dataset.idx);
                let field = e.target.dataset.field;
                if(experiences[idx]) experiences[idx][field] = e.target.value;
                renderPreview();
            });
        });
        document.querySelectorAll('.remove-item[data-type="exp"]').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.idx);
                experiences.splice(idx,1);
                renderExpForm();
                renderPreview();
            });
        });
    }
    function renderEduForm() {
        const container = document.getElementById('eduList');
        container.innerHTML = '';
        educations.forEach((edu, idx) => {
            const div = document.createElement('div');
            div.className = 'array-item';
            div.innerHTML = `<button class="remove-item" data-type="edu" data-idx="${idx}">🗑️</button>
                <div class="form-group"><label>Diplôme</label><input class="edu-degree" value="${escapeHtml(edu.degree)}" data-idx="${idx}" data-field="degree"></div>
                <div class="form-group"><label>Établissement</label><input class="edu-institution" value="${escapeHtml(edu.institution)}" data-idx="${idx}" data-field="institution"></div>
                <div class="form-group"><label>Année</label><input class="edu-year" value="${escapeHtml(edu.year)}" data-idx="${idx}" data-field="year"></div>`;
            container.appendChild(div);
        });
        attachEduEvents();
    }
    function attachEduEvents() {
        document.querySelectorAll('.edu-degree, .edu-institution, .edu-year').forEach(el => {
            el.addEventListener('input', (e) => {
                let idx = parseInt(e.target.dataset.idx);
                let field = e.target.dataset.field;
                if(educations[idx]) educations[idx][field] = e.target.value;
                renderPreview();
            });
        });
        document.querySelectorAll('.remove-item[data-type="edu"]').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.idx);
                educations.splice(idx,1);
                renderEduForm();
                renderPreview();
            });
        });
    }

    function addExperience() { experiences.push({title:"", company:"", period:"", desc:""}); renderExpForm(); renderPreview(); }
    function addEducation() { educations.push({degree:"", institution:"", year:""}); renderEduForm(); renderPreview(); }

    function bindInputs() {
        const ids = ['fullname','phone','email','address','license','website','hideWebsite','languages','hobbies','stageTitle','stageStart','stageEnd','stagePoste','skills'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.addEventListener('input', renderPreview);
            if(el && el.type === 'checkbox') el.addEventListener('change', renderPreview);
        });
    }

    document.getElementById('photoUpload').addEventListener('change', e => {
        if(e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = ev => { photoBase64 = ev.target.result; renderPreview(); };
            reader.readAsDataURL(e.target.files[0]);
        }
    });
    document.getElementById('addExpBtn').addEventListener('click', addExperience);
    document.getElementById('addEduBtn').addEventListener('click', addEducation);

    async function downloadPDF() {
        const el = document.getElementById('cvPreview');
        const btn = document.getElementById('downloadPDF');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        btn.disabled = true;
        try {
            el.style.padding = '0';
            const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            el.style.padding = '';
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            const pageW = 210;
            const pageH = 297;
            const imgW = pageW;
            const imgH = (canvas.height * imgW) / canvas.width;
            if(imgH > pageH) {
                const ratio = pageH / imgH;
                pdf.addImage(canvas, 'PNG', (pageW - imgW*ratio)/2, 0, imgW*ratio, pageH);
            } else {
                pdf.addImage(canvas, 'PNG', 0, 0, imgW, imgH);
            }
            pdf.save('CV_Pavlo_Pashkin.pdf');
        } catch(e) { alert('PDF error: '+e); }
        finally { btn.innerHTML = orig; btn.disabled = false; }
    }
    document.getElementById('downloadPDF').addEventListener('click', downloadPDF);

    function setLanguage(lang) {
        currentLang = lang;
        renderPreview();
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if(btn.dataset.lang === lang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });

    bindInputs();
    renderExpForm();
    renderEduForm();
    setLanguage('fr');
</script>
</body>
</html>
