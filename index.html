<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CV - 5 parties (CLPS) | Constructeur FR/UK/RU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #eef2f8;
            font-family: 'Inter', sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }
        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* barre langue */
        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 28px;
        }
        .lang-btn {
            background: white;
            border: 1px solid #dce5ef;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2c4c6e;
        }
        .lang-btn.active {
            background: #1f4a6e;
            color: white;
            border-color: #1f4a6e;
        }
        .builder-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        /* panneau édition */
        .editor-panel {
            flex: 1.2;
            min-width: 300px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 28px 26px;
            height: fit-content;
        }
        .editor-panel h3 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #1f4870, #2a6f6f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #2c3e4e;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid #cfdfed;
            font-family: inherit;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2a6f6f;
            box-shadow: 0 0 0 3px rgba(42,111,111,0.2);
        }
        .inline-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .inline-row .form-group {
            flex: 1;
        }
        hr {
            margin: 22px 0;
            border: none;
            height: 1px;
            background: #e2edf5;
        }
        .array-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }
        .btn-add {
            background: #eff3f8;
            border: 1px dashed #8ba3bc;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .array-item {
            background: #fafcff;
            padding: 16px;
            border-radius: 24px;
            margin-bottom: 18px;
            border: 1px solid #e9f0f5;
            position: relative;
        }
        .remove-item {
            background: none;
            border: none;
            color: #c0392b;
            font-size: 1.2rem;
            cursor: pointer;
            float: right;
        }
        /* preview */
        .preview-panel {
            flex: 1.8;
            min-width: 360px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .preview-header {
            padding: 20px 28px;
            background: #ffffff;
            border-bottom: 2px solid #eef3fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-pdf {
            background: #1f4870;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cv-card {
            padding: 32px 30px;
            background: white;
        }
        /* STYLES CV 5 PARTIES */
        .cv-five {
            font-family: 'Inter', sans-serif;
        }
        .cv-five .section {
            margin-bottom: 28px;
        }
        .cv-five .section-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1f4a6e;
            border-left: 5px solid #2a6f6f;
            padding-left: 14px;
            margin-bottom: 16px;
            letter-spacing: -0.2px;
        }
        .coordonnees {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 2px solid #e2edf5;
            padding-bottom: 18px;
        }
        .coordonnees .name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1a4a6e;
        }
        .contact-details {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #2c5a7a;
        }
        .titre-stage {
            background: #f3f9ff;
            padding: 14px 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 28px;
        }
        .titre-stage h3 {
            font-weight: 700;
            color: #005f73;
        }
        .competences-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }
        .competence-badge {
            background: #e6f0f5;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .exp-item, .edu-item {
            margin-bottom: 20px;
        }
        .exp-title {
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .exp-date {
            font-weight: 400;
            color: #5f7d9c;
            font-size: 0.8rem;
        }
        .exp-desc {
            font-size: 0.85rem;
            color: #2c4a6e;
            margin-top: 6px;
            line-height: 1.4;
        }
        .info-complementaire {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-top: 8px;
        }
        .info-block {
            background: #f8fbfe;
            padding: 8px 16px;
            border-radius: 20px;
        }
        footer {
            text-align: center;
            margin-top: 32px;
            color: #6c86a3;
            font-size: 0.8rem;
        }
        @media (max-width: 800px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="lang-bar">
        <button class="lang-btn" data-lang="fr"><i class="fas fa-flag"></i> Français</button>
        <button class="lang-btn" data-lang="uk"><i class="fas fa-flag"></i> Українська</button>
        <button class="lang-btn" data-lang="ru"><i class="fas fa-flag"></i> Русский</button>
    </div>
    <div class="builder-grid">
        <!-- ÉDITEUR -->
        <div class="editor-panel">
            <h3>✎ CV 5 parties</h3>
            <!-- I - Coordonnées -->
            <div class="form-group"><label id="lblNom">Nom complet</label><input type="text" id="fullname" value="Paulo PASHKIN"></div>
            <div class="inline-row">
                <div class="form-group"><label id="lblPhone">Téléphone</label><input type="text" id="phone" value="07.45 62.50.02"></div>
                <div class="form-group"><label id="lblEmail">Email</label><input type="email" id="email" value="contact@paulmultiservice.fr"></div>
            </div>
            <div class="inline-row">
                <div class="form-group"><label id="lblAdresse">Adresse / Ville</label><input type="text" id="location" value="Rennes, 35700"></div>
                <div class="form-group"><label id="lblPermis">Permis / Véhicule</label><input type="text" id="permis" value="Permis B - Véhicule"></div>
            </div>
            <div class="form-group"><label id="lblSite">Site web (optionnel)</label><input type="text" id="website" value="paulmultiservice.fr"></div>

            <!-- II - Titre (stage) -->
            <hr>
            <div class="form-group"><label id="lblStageTitle">Titre du stage / objectif</label><input type="text" id="stageTitle" value="Recherche un stage"></div>
            <div class="inline-row">
                <div class="form-group"><label id="lblStageStart">Date début</label><input type="text" id="stageStart" value="29/06/2026"></div>
                <div class="form-group"><label id="lblStageEnd">Date fin</label><input type="text" id="stageEnd" value="17/07/2026"></div>
            </div>
            <div class="form-group"><label id="lblStagePoste">Poste recherché</label><input type="text" id="stagePoste" value="Stagiaire CLPS"></div>

            <!-- III - Compétences -->
            <hr>
            <div class="form-group"><label id="lblCompetences">Compétences (savoir-faire, séparées par des virgules)</label><textarea id="competencesInput" rows="2">Suite Adobe, Community management, Gestion de projet, Canva, WordPress</textarea></div>

            <!-- Expériences pro -->
            <div class="array-header"><label id="lblExperiences"><i class="fas fa-briefcase"></i> Expériences pro</label><button type="button" class="btn-add" id="addExpBtn"><i class="fas fa-plus"></i> Ajouter</button></div>
            <div id="expContainer"></div>

            <!-- IV - Formations -->
            <div class="array-header"><label id="lblFormations"><i class="fas fa-graduation-cap"></i> Formations / Diplômes</label><button type="button" class="btn-add" id="addEduBtn"><i class="fas fa-plus"></i> Ajouter</button></div>
            <div id="eduContainer"></div>

            <!-- V - Infos complémentaires -->
            <hr>
            <div class="form-group"><label id="lblLangues">Langues</label><input type="text" id="langues" value="Anglais (intermédiaire), Espagnol (notions)"></div>
            <div class="form-group"><label id="lblLoisirs">Loisirs / Centres d'intérêt</label><input type="text" id="loisirs" value="Sport, photographie, bénévolat"></div>
        </div>

        <!-- PRÉVISUALISATION 5 PARTIES -->
        <div class="preview-panel">
            <div class="preview-header"><h2><i class="far fa-file-alt"></i> CV - 5 parties</h2><button class="btn-pdf" id="downloadPDFBtn"><i class="fas fa-download"></i> PDF</button></div>
            <div class="cv-card" id="resumeCard"><div id="resumeContent"></div></div>
        </div>
    </div>
    <footer>✔️ CV conforme à la structure CLPS : I Coordonnées / II Titre stage / III Compétences+Expériences / IV Formations / V Complément (langues, loisirs)</footer>
</div>

<script>
    // ------------------------- DONNÉES -------------------------
    let experiences = [
        { titre: "Stagiaire CLPS", entreprise: "CLPS Rennes", periode: "29/06/2026 - 17/07/2026", description: "Découverte des processus administratifs, accueil, classement, saisie." }
    ];
    let formations = [
        { diplome: "Baccalauréat", etablissement: "Lycée X, Rennes", annee: "2025" },
        { diplome: "Formation multimédia", etablissement: "CLPS Rennes", annee: "2026" }
    ];

    let currentLang = 'fr';

    const translations = {
        fr: {
            lblNom: "Nom complet", lblPhone: "Téléphone", lblEmail: "Email", lblAdresse: "Adresse / Ville", lblPermis: "Permis / Véhicule", lblSite: "Site web",
            lblStageTitle: "Titre du stage / objectif", lblStageStart: "Date début", lblStageEnd: "Date fin", lblStagePoste: "Poste recherché",
            lblCompetences: "Compétences (séparées par des virgules)", lblExperiences: "Expériences professionnelles", lblFormations: "Formations / Diplômes",
            lblLangues: "Langues", lblLoisirs: "Loisirs / Intérêts",
            newExpTitre: "Nouveau poste", newExpEntreprise: "Entreprise", newExpPeriode: "2024 – 2025", newExpDesc: "Descriptif du poste",
            newDiplome: "Nouveau diplôme", newEtablissement: "Établissement", newAnnee: "2025"
        },
        uk: {
            lblNom: "Повне ім'я", lblPhone: "Телефон", lblEmail: "Email", lblAdresse: "Адреса / Місто", lblPermis: "Права / Транспорт", lblSite: "Веб-сайт",
            lblStageTitle: "Мета стажування", lblStageStart: "Дата початку", lblStageEnd: "Дата завершення", lblStagePoste: "Посада стажера",
            lblCompetences: "Навички (через кому)", lblExperiences: "Досвід роботи", lblFormations: "Освіта / Дипломи",
            lblLangues: "Мови", lblLoisirs: "Хобі / Інтереси",
            newExpTitre: "Нова посада", newExpEntreprise: "Компанія", newExpPeriode: "2024 – 2025", newExpDesc: "Опис обов'язків",
            newDiplome: "Новий диплом", newEtablissement: "Заклад освіти", newAnnee: "2025"
        },
        ru: {
            lblNom: "Полное имя", lblPhone: "Телефон", lblEmail: "Email", lblAdresse: "Адрес / Город", lblPermis: "Права / Транспорт", lblSite: "Сайт",
            lblStageTitle: "Цель стажировки", lblStageStart: "Дата начала", lblStageEnd: "Дата окончания", lblStagePoste: "Должность стажёра",
            lblCompetences: "Навыки (через запятую)", lblExperiences: "Опыт работы", lblFormations: "Образование / Дипломы",
            lblLangues: "Языки", lblLoisirs: "Хобби / Интересы",
            newExpTitre: "Новая должность", newExpEntreprise: "Компания", newExpPeriode: "2024 – 2025", newExpDesc: "Описание обязанностей",
            newDiplome: "Новый диплом", newEtablissement: "Учебное заведение", newAnnee: "2025"
        }
    };

    function updateUILabels() {
        const t = translations[currentLang];
        document.getElementById('lblNom').innerText = t.lblNom;
        document.getElementById('lblPhone').innerText = t.lblPhone;
        document.getElementById('lblEmail').innerText = t.lblEmail;
        document.getElementById('lblAdresse').innerText = t.lblAdresse;
        document.getElementById('lblPermis').innerText = t.lblPermis;
        document.getElementById('lblSite').innerText = t.lblSite;
        document.getElementById('lblStageTitle').innerText = t.lblStageTitle;
        document.getElementById('lblStageStart').innerText = t.lblStageStart;
        document.getElementById('lblStageEnd').innerText = t.lblStageEnd;
        document.getElementById('lblStagePoste').innerText = t.lblStagePoste;
        document.getElementById('lblCompetences').innerText = t.lblCompetences;
        document.getElementById('lblExperiences').innerHTML = '<i class="fas fa-briefcase"></i> ' + t.lblExperiences;
        document.getElementById('lblFormations').innerHTML = '<i class="fas fa-graduation-cap"></i> ' + t.lblFormations;
        document.getElementById('lblLangues').innerText = t.lblLangues;
        document.getElementById('lblLoisirs').innerText = t.lblLoisirs;
    }

    function renderPreview() {
        const nom = document.getElementById('fullname').value || "Nom";
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const adresse = document.getElementById('location').value;
        const permis = document.getElementById('permis').value;
        const website = document.getElementById('website').value;
        const stageTitle = document.getElementById('stageTitle').value;
        const stageStart = document.getElementById('stageStart').value;
        const stageEnd = document.getElementById('stageEnd').value;
        const stagePoste = document.getElementById('stagePoste').value;
        const competencesRaw = document.getElementById('competencesInput').value;
        const competences = competencesRaw.split(',').map(s=>s.trim()).filter(s=>s);
        const langues = document.getElementById('langues').value;
        const loisirs = document.getElementById('loisirs').value;

        let html = `<div class="cv-five">`;

        // I - Coordonnées
        html += `<div class="coordonnees"><div class="name">${escapeHtml(nom)}</div><div class="contact-details">`;
        if(phone) html += `<span><i class="fas fa-phone-alt"></i> ${escapeHtml(phone)}</span>`;
        if(email) html += `<span><i class="fas fa-envelope"></i> ${escapeHtml(email)}</span>`;
        if(adresse) html += `<span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(adresse)}</span>`;
        if(permis) html += `<span><i class="fas fa-car"></i> ${escapeHtml(permis)}</span>`;
        if(website) html += `<span><i class="fas fa-globe"></i> ${escapeHtml(website)}</span>`;
        html += `</div></div>`;

        // II - Titre stage
        html += `<div class="titre-stage"><h3>${escapeHtml(stageTitle)}</h3><p>Du ${escapeHtml(stageStart)} au ${escapeHtml(stageEnd)}<br><strong>${escapeHtml(stagePoste)}</strong></p></div>`;

        // III - Compétences
        if(competences.length) {
            html += `<div class="section"><div class="section-title">III - COMPÉTENCES</div><div class="competences-list">`;
            competences.forEach(c => html += `<span class="competence-badge">${escapeHtml(c)}</span>`);
            html += `</div></div>`;
        }
        // Expériences
        if(experiences.length) {
            html += `<div class="section"><div class="section-title">EXPÉRIENCES PROFESSIONNELLES</div>`;
            experiences.forEach(exp => {
                html += `<div class="exp-item"><div class="exp-title"><span>${escapeHtml(exp.titre)} - ${escapeHtml(exp.entreprise)}</span><span class="exp-date">${escapeHtml(exp.periode)}</span></div>`;
                if(exp.description) html += `<div class="exp-desc">${escapeHtml(exp.description)}</div>`;
                html += `</div>`;
            });
            html += `</div>`;
        }

        // IV - Formations
        if(formations.length) {
            html += `<div class="section"><div class="section-title">IV - FORMATIONS / DIPLÔMES</div>`;
            formations.forEach(edu => {
                html += `<div class="edu-item"><div class="exp-title"><span>${escapeHtml(edu.diplome)} - ${escapeHtml(edu.etablissement)}</span><span class="exp-date">${escapeHtml(edu.annee)}</span></div></div>`;
            });
            html += `</div>`;
        }

        // V - Infos complémentaires
        if(langues || loisirs) {
            html += `<div class="section"><div class="section-title">V - INFORMATIONS COMPLÉMENTAIRES</div><div class="info-complementaire">`;
            if(langues) html += `<div class="info-block"><i class="fas fa-language"></i> Langues : ${escapeHtml(langues)}</div>`;
            if(loisirs) html += `<div class="info-block"><i class="fas fa-heart"></i> Loisirs : ${escapeHtml(loisirs)}</div>`;
            html += `</div></div>`;
        }

        html += `</div>`;
        document.getElementById('resumeContent').innerHTML = html;
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Gestion expériences
    function renderExpForm() {
        const container = document.getElementById('expContainer');
        container.innerHTML = '';
        experiences.forEach((exp, idx) => {
            let block = document.createElement('div'); block.className = 'array-item';
            block.innerHTML = `<button type="button" class="remove-item" data-type="exp" data-index="${idx}"><i class="fas fa-trash-alt"></i></button>
                <div class="form-group"><label>Titre</label><input type="text" class="exp-titre" value="${escapeHtml(exp.titre)}" data-index="${idx}" data-field="titre"></div>
                <div class="form-group"><label>Entreprise</label><input type="text" class="exp-entreprise" value="${escapeHtml(exp.entreprise)}" data-index="${idx}" data-field="entreprise"></div>
                <div class="form-group"><label>Période</label><input type="text" class="exp-periode" value="${escapeHtml(exp.periode)}" data-index="${idx}" data-field="periode"></div>
                <div class="form-group"><label>Description</label><textarea class="exp-desc" data-index="${idx}" data-field="description" rows="2">${escapeHtml(exp.description)}</textarea></div>`;
            container.appendChild(block);
        });
        document.querySelectorAll('.exp-titre, .exp-entreprise, .exp-periode, .exp-desc').forEach(el => {
            el.addEventListener('input', function(e) { let idx = parseInt(e.target.dataset.index); if(!isNaN(idx) && experiences[idx]) { experiences[idx][e.target.dataset.field] = e.target.value; renderPreview(); } });
        });
        document.querySelectorAll('.remove-item[data-type="exp"]').forEach(btn => btn.addEventListener('click', function(e) { let idx = parseInt(btn.dataset.index); if(!isNaN(idx)) { experiences.splice(idx,1); renderExpForm(); renderPreview(); } }));
    }
    function renderEduForm() {
        const container = document.getElementById('eduContainer');
        container.innerHTML = '';
        formations.forEach((edu, idx) => {
            let block = document.createElement('div'); block.className = 'array-item';
            block.innerHTML = `<button type="button" class="remove-item" data-type="edu" data-index="${idx}"><i class="fas fa-trash-alt"></i></button>
                <div class="form-group"><label>Diplôme</label><input type="text" class="edu-diplome" value="${escapeHtml(edu.diplome)}" data-index="${idx}" data-field="diplome"></div>
                <div class="form-group"><label>Établissement</label><input type="text" class="edu-etablissement" value="${escapeHtml(edu.etablissement)}" data-index="${idx}" data-field="etablissement"></div>
                <div class="form-group"><label>Année</label><input type="text" class="edu-annee" value="${escapeHtml(edu.annee)}" data-index="${idx}" data-field="annee"></div>`;
            container.appendChild(block);
        });
        document.querySelectorAll('.edu-diplome, .edu-etablissement, .edu-annee').forEach(el => {
            el.addEventListener('input', function(e) { let idx = parseInt(e.target.dataset.index); if(!isNaN(idx) && formations[idx]) { formations[idx][e.target.dataset.field] = e.target.value; renderPreview(); } });
        });
        document.querySelectorAll('.remove-item[data-type="edu"]').forEach(btn => btn.addEventListener('click', function(e) { let idx = parseInt(btn.dataset.index); if(!isNaN(idx)) { formations.splice(idx,1); renderEduForm(); renderPreview(); } }));
    }

    function addExp() { const t=translations[currentLang]; experiences.push({titre: t.newExpTitre, entreprise: t.newExpEntreprise, periode: t.newExpPeriode, description: t.newExpDesc}); renderExpForm(); renderPreview(); }
    function addEdu() { const t=translations[currentLang]; formations.push({diplome: t.newDiplome, etablissement: t.newEtablissement, annee: t.newAnnee}); renderEduForm(); renderPreview(); }

    function bindInputs() {
        const ids = ['fullname','phone','email','location','permis','website','stageTitle','stageStart','stageEnd','stagePoste','competencesInput','langues','loisirs'];
        ids.forEach(id => { let el = document.getElementById(id); if(el) el.addEventListener('input', renderPreview); });
    }
    function downloadPDF() { html2pdf().set({ margin: 0.5, filename: `CV_5parties_${currentLang}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(document.getElementById('resumeCard')).save(); }

    function setLanguage(lang) {
        currentLang = lang;
        updateUILabels();
        renderExpForm(); renderEduForm(); renderPreview();
        document.querySelectorAll('.lang-btn').forEach(btn => { if(btn.dataset.lang === lang) btn.classList.add('active'); else btn.classList.remove('active'); });
    }

    document.getElementById('addExpBtn').addEventListener('click', addExp);
    document.getElementById('addEduBtn').addEventListener('click', addEdu);
    document.getElementById('downloadPDFBtn').addEventListener('click', downloadPDF);
    document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.dataset.lang)));
    bindInputs(); renderExpForm(); renderEduForm(); setLanguage('fr');
</script>
</body>
</html>
