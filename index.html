<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CV Builder - 5 parties | PDF pleine largeur A4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef2f8; font-family: 'Inter', sans-serif; padding: 1rem; color: #1a2c3e; }
        .app-wrapper { max-width: 1400px; margin: 0 auto; }
        .lang-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { background: white; border: 1px solid #dce5ef; padding: 6px 16px; border-radius: 40px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .lang-btn.active { background: #1f4a6e; color: white; border-color: #1f4a6e; }
        .builder-grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .editor-panel { flex: 1.2; min-width: 280px; background: white; border-radius: 28px; padding: 20px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 25px -12px rgba(0,0,0,0.1); }
        .editor-panel h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: #1f4870; }
        .form-group { margin-bottom: 16px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.8rem; color: #2c3e4e; }
        input, textarea { width: 100%; padding: 10px 14px; border-radius: 20px; border: 1px solid #cfdfed; font-family: inherit; font-size: 0.85rem; }
        .inline-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .inline-row .form-group { flex: 1; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
        .checkbox-group label { font-weight: 500; margin: 0; }
        hr { margin: 18px 0; }
        .array-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .btn-add { background: #eff3f8; border: 1px dashed #8ba3bc; padding: 5px 14px; border-radius: 40px; font-size: 0.75rem; cursor: pointer; }
        .array-item { background: #fafcff; padding: 12px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #e9f0f5; position: relative; }
        .remove-item { background: none; border: none; color: #c0392b; cursor: pointer; float: right; }
        .preview-panel { flex: 1.8; min-width: 340px; background: white; border-radius: 28px; box-shadow: 0 10px 25px -12px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .preview-header { padding: 12px 20px; background: white; border-bottom: 1px solid #eef3fa; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .zoom-controls { display: flex; gap: 8px; align-items: center; background: #f8fafc; padding: 4px 10px; border-radius: 40px; }
        .zoom-btn { background: #eef2f8; border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .zoom-value { font-weight: 600; min-width: 45px; text-align: center; font-size: 0.8rem; }
        .btn-pdf { background: #1f4870; border: none; padding: 6px 18px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .cv-card { padding: 0; margin: 0; background: white; }
        .cv-five { font-family: 'Inter', sans-serif; line-height: 1.3; width: 100%; margin: 0; padding: 0; }
        .cv-five .section { margin-bottom: 12px; }
        .cv-five .section-title { font-weight: 800; color: #1f4a6e; border-left: 4px solid #2a6f6f; padding-left: 10px; margin-bottom: 8px; font-size: 1rem; }
        .coordonnees { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border-bottom: 1px solid #e2edf5; padding-bottom: 10px; flex-wrap: wrap; }
        .cv-photo { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #2a6f6f; background: #f4f9fe; }
        .coord-text .name { font-weight: 800; color: #1a4a6e; margin-bottom: 4px; font-size: 1.4rem; }
        .contact-details { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.7rem; color: #2c5a7a; }
        .titre-stage { background: #f3f9ff; padding: 6px 12px; border-radius: 16px; text-align: center; margin-bottom: 12px; font-size: 0.8rem; }
        .competences-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .competence-badge { background: #e6f0f5; padding: 3px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 500; }
        .exp-item, .edu-item { margin-bottom: 10px; }
        .exp-title { font-weight: 700; display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 2px; font-size: 0.85rem; }
        .exp-date { font-weight: 400; color: #5f7d9c; font-size: 0.7rem; }
        .exp-desc { font-size: 0.75rem; color: #2c4a6e; margin-top: 3px; line-height: 1.3; }
        .info-complementaire { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 6px; }
        .info-block { background: #f8fbfe; padding: 4px 12px; border-radius: 16px; font-size: 0.7rem; }
        footer { text-align: center; margin-top: 20px; color: #6c86a3; font-size: 0.7rem; }
        .rtl { direction: rtl; text-align: right; }
        .rtl .section-title { border-left: none; border-right: 4px solid #2a6f6f; padding-left: 0; padding-right: 10px; }
        .creator-credit { position: fixed; bottom: 15px; right: 15px; background: rgba(31,72,112,0.85); backdrop-filter: blur(8px); padding: 4px 12px; border-radius: 30px; color: white; font-size: 0.7rem; z-index: 1000; pointer-events: none; }
        @media (max-width: 700px) { .coordonnees { flex-direction: column; text-align: center; } .contact-details { justify-content: center; } }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="lang-bar">
        <button class="lang-btn" data-lang="fr"><i class="fas fa-flag"></i> Français</button>
        <button class="lang-btn" data-lang="en"><i class="fas fa-flag"></i> English</button>
        <button class="lang-btn" data-lang="uk"><i class="fas fa-flag"></i> Українська</button>
        <button class="lang-btn" data-lang="ru"><i class="fas fa-flag"></i> Русский</button>
        <button class="lang-btn" data-lang="ar"><i class="fas fa-flag"></i> العربية</button>
        <button class="lang-btn" data-lang="prs"><i class="fas fa-flag"></i> دری</button>
    </div>
    <div class="builder-grid">
        <div class="editor-panel">
            <h3>✎ CV 5 parties</h3>
            <div class="form-group"><label id="lblPhoto">📷 Photo</label><input type="file" id="photoUpload" accept="image/jpeg, image/png, image/jpg"></div>
            <div class="form-group"><label id="lblNom">Nom complet</label><input type="text" id="fullname" value="Pavlo Pashkin" placeholder="Pavlo Pashkin"></div>
            <div class="inline-row"><div class="form-group"><label id="lblPhone">Téléphone</label><input type="text" id="phone" value="07 45 62 50 07"></div><div class="form-group"><label id="lblEmail">Email</label><input type="email" id="email" value="contact@paulmultiservice.fr"></div></div>
            <div class="inline-row"><div class="form-group"><label id="lblAdresse">Adresse / Ville</label><input type="text" id="location" value="Rennes, France"></div><div class="form-group"><label id="lblPermis">Permis / Véhicule</label><input type="text" id="permis" value="Permis B, C"></div></div>
            <div class="form-group"><label id="lblSite">Site web</label><input type="text" id="website" value="paulmultiservice.fr"></div>
            <div class="checkbox-group"><input type="checkbox" id="hideWebsiteCheckbox"> <label id="lblHideWebsite">Masquer le site web</label></div>
            <hr>
            <div class="form-group"><label id="lblStageTitle">Titre du stage</label><input type="text" id="stageTitle" value="Recherche stagiaire"></div>
            <div class="inline-row"><div class="form-group"><label id="lblStageStart">Date début</label><input type="text" id="stageStart" value="29/06/2026"></div><div class="form-group"><label id="lblStageEnd">Date fin</label><input type="text" id="stageEnd" value="17/07/2026"></div></div>
            <div class="form-group"><label id="lblStagePoste">Poste recherché</label><input type="text" id="stagePoste" value="Stagiaire CLPS"></div>
            <hr>
            <div class="form-group"><label id="lblCompetences">Compétences (séparées par virgules)</label><textarea id="competencesInput" rows="3">Petit bricolage, Maintenance technique, Conseil informatique, Développement Web, Pack Office, Gestion de crise</textarea></div>
            <div class="array-header"><label id="lblExperiences">Expériences</label><button class="btn-add" id="addExpBtn"><i class="fas fa-plus"></i> <span id="addExpText">Ajouter</span></button></div>
            <div id="expContainer"></div>
            <div class="array-header"><label id="lblFormations">Formations</label><button class="btn-add" id="addEduBtn"><i class="fas fa-plus"></i> <span id="addEduText">Ajouter</span></button></div>
            <div id="eduContainer"></div>
            <hr>
            <div class="form-group"><label id="lblLangues">Langues</label><input type="text" id="langues" value="Ukrainien (maternel), Russe (bilingue), Français (A2-B1)"></div>
            <div class="form-group"><label id="lblLoisirs">Loisirs</label><input type="text" id="loisirs" value="Football, nouvelles technologies"></div>
        </div>
        <div class="preview-panel">
            <div class="preview-header">
                <h2><i class="far fa-file-alt"></i> <span id="previewTitle">Aperçu CV</span></h2>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomOutBtn">A−</button>
                        <span class="zoom-value" id="zoomPercent">100%</span>
                        <button class="zoom-btn" id="zoomInBtn">A+</button>
                        <button class="zoom-btn" id="zoomResetBtn">↺</button>
                    </div>
                    <button class="btn-pdf" id="downloadPDFBtn"><i class="fas fa-download"></i> <span id="pdfBtnText">PDF</span></button>
                </div>
            </div>
            <div class="cv-card" id="resumeCard"><div id="resumeContent"></div></div>
        </div>
    </div>
    <footer id="footerText">✔️ Ajustez le zoom, le PDF tient sur une page A4 sans marges latérales.</footer>
</div>
<div class="creator-credit"><i class="fas fa-code"></i> Pavlo Pashkin</div>

<script>
    let experiences = [
        { titre: "Chef d'Entreprise - PaulMultiService", entreprise: "Rennes", periode: "02/2026 - En cours", description: "Conseil informatique, assistance technique, développement du site web. Gestion administrative et client." },
        { titre: "Officier Logisticien", entreprise: "Service des Transports Militaires (Ukraine)", periode: "2023-2024", description: "Planification des flux de transport, management d'unité, gestion de crise." }
    ];
    let formations = [
        { diplome: "Formation Prépa Avenir FL", etablissement: "CLPS Rennes", annee: "2026 (En cours)" },
        { diplome: "Licence - Technologies de Transport", etablissement: "Université d'Ukraine", annee: "2023" }
    ];
    let currentLang = 'fr';
    let photoBase64 = "";
    let currentZoom = 100;

    // Traductions complètes pour 6 langues
    const translations = {
        fr: { lblPhoto:"📷 Photo", lblNom:"Nom complet", lblPhone:"Téléphone", lblEmail:"Email", lblAdresse:"Adresse / Ville", lblPermis:"Permis / Véhicule", lblSite:"Site web", lblHideWebsite:"Masquer le site web",
              lblStageTitle:"Titre du stage", lblStageStart:"Date début", lblStageEnd:"Date fin", lblStagePoste:"Poste recherché",

              sectionComp:"III - COMPÉTENCES", sectionExp:"EXPÉRIENCES PROFESSIONNELLES", sectionForm:"IV - FORMATIONS / DIPLÔMES", sectionInfo:"V - INFORMATIONS COMPLÉMENTAIRES", langLabel:"Langues :", loisirLabel:"Loisirs :", stageDu:"Du", stageAu:"au" },
        en: { lblPhoto:"📷 Photo", lblNom:"Full name", lblPhone:"Phone", lblEmail:"Email", lblAdresse:"Address / City", lblPermis:"License / Vehicle", lblSite:"Website", lblHideWebsite:"Hide website",
              lblStageTitle:"Internship title", lblStageStart:"Start date", lblStageEnd:"End date", lblStagePoste:"Position sought",
              lblCompetences:"Skills (comma separated)", lblExperiences:"Work experience", lblFormations:"Education / Degrees",
              lblLangues:"Languages", lblLoisirs:"Hobbies", addExpText:"Add", addEduText:"Add", previewTitle:"CV Preview", pdfBtnText:"PDF",
              footerText:"✔️ Adjust zoom, PDF fits A4 full width without margins.",
              sectionComp:"III - SKILLS", sectionExp:"WORK EXPERIENCE", sectionForm:"IV - EDUCATION", sectionInfo:"V - ADDITIONAL INFO", langLabel:"Languages:", loisirLabel:"Hobbies:", stageDu:"From", stageAu:"to" },
        uk: { lblPhoto:"📷 Фото", lblNom:"Повне ім'я", lblPhone:"Телефон", lblEmail:"Email", lblAdresse:"Адреса / Місто", lblPermis:"Права / Транспорт", lblSite:"Веб-сайт", lblHideWebsite:"Сховати веб-сайт",
              lblStageTitle:"Мета стажування", lblStageStart:"Дата початку", lblStageEnd:"Дата завершення", lblStagePoste:"Посада",
              lblCompetences:"Навички (через кому)", lblExperiences:"Досвід роботи", lblFormations:"Освіта / Дипломи",
              lblLangues:"Мови", lblLoisirs:"Хобі", addExpText:"Додати", addEduText:"Додати", previewTitle:"Попередній перегляд", pdfBtnText:"PDF",
              footerText:"✔️ Регулюйте масштаб, PDF вміщується на A4 без полів.",
              sectionComp:"III - НАВИЧКИ", sectionExp:"ДОСВІД РОБОТИ", sectionForm:"IV - ОСВІТА", sectionInfo:"V - ДОДАТКОВА ІНФОРМАЦІЯ", langLabel:"Мови:", loisirLabel:"Хобі:", stageDu:"з", stageAu:"по" },
        ru: { lblPhoto:"📷 Фото", lblNom:"Полное имя", lblPhone:"Телефон", lblEmail:"Email", lblAdresse:"Адрес / Город", lblPermis:"Права / Транспорт", lblSite:"Сайт", lblHideWebsite:"Скрыть сайт",
              lblStageTitle:"Цель стажировки", lblStageStart:"Дата начала", lblStageEnd:"Дата окончания", lblStagePoste:"Должность",
              lblCompetences:"Навыки (через запятую)", lblExperiences:"Опыт работы", lblFormations:"Образование / Дипломы",
              lblLangues:"Языки", lblLoisirs:"Хобби", addExpText:"Добавить", addEduText:"Добавить", previewTitle:"Просмотр резюме", pdfBtnText:"PDF",
              footerText:"✔️ Регулируйте масштаб, PDF помещается на A4 без полей.",
              sectionComp:"III - НАВЫКИ", sectionExp:"ОПЫТ РАБОТЫ", sectionForm:"IV - ОБРАЗОВАНИЕ", sectionInfo:"V - ДОПОЛНИТЕЛЬНАЯ ИНФОРМАЦИЯ", langLabel:"Языки:", loisirLabel:"Хобби:", stageDu:"с", stageAu:"по" },
        ar: { lblPhoto:"📷 صورة", lblNom:"الاسم الكامل", lblPhone:"الهاتف", lblEmail:"البريد الإلكتروني", lblAdresse:"العنوان / المدينة", lblPermis:"رخصة القيادة", lblSite:"الموقع الإلكتروني", lblHideWebsite:"إخفاء الموقع",
              lblStageTitle:"عنوان التدريب", lblStageStart:"تاريخ البداية", lblStageEnd:"تاريخ النهاية", lblStagePoste:"المنصب المطلوب",
              lblCompetences:"المهارات (مفصولة بفواصل)", lblExperiences:"الخبرات المهنية", lblFormations:"التعليم / الشهادات",
              lblLangues:"اللغات", lblLoisirs:"الهوايات", addExpText:"إضافة", addEduText:"إضافة", previewTitle:"معاينة السيرة الذاتية", pdfBtnText:"PDF",
              footerText:"✔️ ضبط التكبير، PDF يلتحم على صفحة A4 بدون هوامش.",
              sectionComp:"ثالثاً - المهارات", sectionExp:"الخبرات المهنية", sectionForm:"رابعاً - التعليم", sectionInfo:"خامساً - معلومات إضافية", langLabel:"اللغات:", loisirLabel:"الهوايات:", stageDu:"من", stageAu:"إلى" },
        prs: { lblPhoto:"📷 عکس", lblNom:"نام کامل", lblPhone:"تلفن", lblEmail:"ایمیل", lblAdresse:"آدرس / شهر", lblPermis:"جواز رانندگی", lblSite:"ویب‌سایت", lblHideWebsite:"پنهان کردن وب‌سایت",
              lblStageTitle:"عنوان کارآموزی", lblStageStart:"تاریخ شروع", lblStageEnd:"تاریخ ختم", lblStagePoste:"موقعیت مورد نظر",
              lblCompetences:"مهارت‌ها (با کاما جدا شود)", lblExperiences:"تجارب کاری", lblFormations:"تحصیلات / دیپلم‌ها",
              lblLangues:"زبان‌ها", lblLoisirs:"سرگرمی‌ها", addExpText:"افزودن", addEduText:"افزودن", previewTitle:"پیش‌نمایش رزومه", pdfBtnText:"PDF",
              footerText:"✔️ بزرگنمایی را تنظیم کنید، PDF در یک صفحه A4 بدون حاشیه جای می‌گیرد.",
              sectionComp:"III - مهارت‌ها", sectionExp:"تجارب کاری", sectionForm:"IV - تحصیلات", sectionInfo:"V - اطلاعات تکمیلی", langLabel:"زبان‌ها:", loisirLabel:"سرگرمی‌ها:", stageDu:"از", stageAu:"تا" }
    };

    function updateUILabels() {
        const t = translations[currentLang];
        if(!t) return;
        document.getElementById('lblPhoto').innerHTML = t.lblPhoto;
        document.getElementById('lblNom').innerText = t.lblNom;
        document.getElementById('lblPhone').innerText = t.lblPhone;
        document.getElementById('lblEmail').innerText = t.lblEmail;
        document.getElementById('lblAdresse').innerText = t.lblAdresse;
        document.getElementById('lblPermis').innerText = t.lblPermis;
        document.getElementById('lblSite').innerText = t.lblSite;
        document.getElementById('lblHideWebsite').innerText = t.lblHideWebsite;
        document.getElementById('lblStageTitle').innerText = t.lblStageTitle;
        document.getElementById('lblStageStart').innerText = t.lblStageStart;
        document.getElementById('lblStageEnd').innerText = t.lblStageEnd;
        document.getElementById('lblStagePoste').innerText = t.lblStagePoste;
        document.getElementById('lblCompetences').innerText = t.lblCompetences;
        document.getElementById('lblExperiences').innerHTML = '<i class="fas fa-briefcase"></i> ' + t.lblExperiences;
        document.getElementById('lblFormations').innerHTML = '<i class="fas fa-graduation-cap"></i> ' + t.lblFormations;
        document.getElementById('lblLangues').innerText = t.lblLangues;
        document.getElementById('lblLoisirs').innerText = t.lblLoisirs;
        document.getElementById('addExpText').innerText = t.addExpText;
        document.getElementById('addEduText').innerText = t.addEduText;
        document.getElementById('previewTitle').innerText = t.previewTitle;
        document.getElementById('pdfBtnText').innerText = t.pdfBtnText;
        document.getElementById('footerText').innerText = t.footerText;
    }

    function applyZoom() {
        const cv = document.querySelector('#resumeContent .cv-five');
        if(cv) {
            let base = 11;
            cv.style.fontSize = (base * currentZoom / 100) + 'pt';
            document.getElementById('zoomPercent').innerText = currentZoom + '%';
        }
    }
    function zoomIn() { if(currentZoom < 150) { currentZoom += 10; applyZoom(); } }
    function zoomOut() { if(currentZoom > 60) { currentZoom -= 10; applyZoom(); } }
    function zoomReset() { currentZoom = 100; applyZoom(); }

    function renderPreview() {
        const t = translations[currentLang];
        const nom = document.getElementById('fullname').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const adresse = document.getElementById('location').value;
        const permis = document.getElementById('permis').value;
        let website = document.getElementById('website').value;
        if(document.getElementById('hideWebsiteCheckbox').checked) website = "";
        const stageTitle = document.getElementById('stageTitle').value;
        const stageStart = document.getElementById('stageStart').value;
        const stageEnd = document.getElementById('stageEnd').value;
        const stagePoste = document.getElementById('stagePoste').value;
        const competencesRaw = document.getElementById('competencesInput').value;
        const competences = competencesRaw.split(',').map(s=>s.trim()).filter(s=>s);
        const langues = document.getElementById('langues').value;
        const loisirs = document.getElementById('loisirs').value;

        let html = `<div class="cv-five">`;
        html += `<div class="coordonnees">`;
        if(photoBase64) html += `<img src="${photoBase64}" class="cv-photo" alt="photo">`;
        else html += `<div class="cv-photo" style="background:#eef2f8; display:flex; align-items:center; justify-content:center;">📷</div>`;
        html += `<div class="coord-text"><div class="name">${escapeHtml(nom) || "Votre nom"}</div><div class="contact-details">`;
        if(phone) html += `<span><i class="fas fa-phone-alt"></i> ${escapeHtml(phone)}</span>`;
        if(email) html += `<span><i class="fas fa-envelope"></i> ${escapeHtml(email)}</span>`;
        if(adresse) html += `<span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(adresse)}</span>`;
        if(permis) html += `<span><i class="fas fa-car"></i> ${escapeHtml(permis)}</span>`;
        if(website) html += `<span><i class="fas fa-globe"></i> ${escapeHtml(website)}</span>`;
        html += `</div></div></div>`;
        html += `<div class="titre-stage"><h3>${escapeHtml(stageTitle) || "Objectif stage"}</h3><p>${t.stageDu} ${escapeHtml(stageStart)} ${t.stageAu} ${escapeHtml(stageEnd)}<br><strong>${escapeHtml(stagePoste) || "Poste recherché"}</strong></p></div>`;
        if(competences.length) {
            html += `<div class="section"><div class="section-title">${t.sectionComp}</div><div class="competences-list">`;
            competences.forEach(c => html += `<span class="competence-badge">${escapeHtml(c)}</span>`);
            html += `</div></div>`;
        }
        if(experiences.length) {
            html += `<div class="section"><div class="section-title">${t.sectionExp}</div>`;
            experiences.forEach(exp => {
                html += `<div class="exp-item"><div class="exp-title"><span>${escapeHtml(exp.titre)} - ${escapeHtml(exp.entreprise)}</span><span class="exp-date">${escapeHtml(exp.periode)}</span></div>`;
                if(exp.description) html += `<div class="exp-desc">${escapeHtml(exp.description)}</div>`;
                html += `</div>`;
            });
            html += `</div>`;
        }
        if(formations.length) {
            html += `<div class="section"><div class="section-title">${t.sectionForm}</div>`;
            formations.forEach(edu => {
                html += `<div class="edu-item"><div class="exp-title"><span>${escapeHtml(edu.diplome)} - ${escapeHtml(edu.etablissement)}</span><span class="exp-date">${escapeHtml(edu.annee)}</span></div></div>`;
            });
            html += `</div>`;
        }
        if(langues || loisirs) {
            html += `<div class="section"><div class="section-title">${t.sectionInfo}</div><div class="info-complementaire">`;
            if(langues) html += `<div class="info-block"><i class="fas fa-language"></i> ${t.langLabel} ${escapeHtml(langues)}</div>`;
            if(loisirs) html += `<div class="info-block"><i class="fas fa-heart"></i> ${t.loisirLabel} ${escapeHtml(loisirs)}</div>`;
            html += `</div></div>`;
        }
        html += `</div>`;
        document.getElementById('resumeContent').innerHTML = html;
        const cvDiv = document.querySelector('#resumeContent .cv-five');
        if(cvDiv && (currentLang === 'ar' || currentLang === 'prs')) cvDiv.classList.add('rtl');
        else if(cvDiv) cvDiv.classList.remove('rtl');
        applyZoom();
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>(m==='&'?'&amp;':m==='<'?'&lt;':'&gt;')); }

    function renderExpForm() {
        const container = document.getElementById('expContainer');
        container.innerHTML = '';
        experiences.forEach((exp, idx) => {
            let div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<button class="remove-item" data-type="exp" data-index="${idx}"><i class="fas fa-trash-alt"></i></button>
                <div class="form-group"><label>Titre</label><input class="exp-titre" value="${escapeHtml(exp.titre)}" data-index="${idx}" data-field="titre" placeholder="Titre"></div>
                <div class="form-group"><label>Entreprise</label><input class="exp-entreprise" value="${escapeHtml(exp.entreprise)}" data-index="${idx}" data-field="entreprise" placeholder="Entreprise"></div>
                <div class="form-group"><label>Période</label><input class="exp-periode" value="${escapeHtml(exp.periode)}" data-index="${idx}" data-field="periode" placeholder="Période"></div>
                <div class="form-group"><label>Description</label><textarea class="exp-desc" data-index="${idx}" data-field="description" rows="2">${escapeHtml(exp.description)}</textarea></div>`;
            container.appendChild(div);
        });
        attachExpEvents();
    }
    function attachExpEvents() {
        document.querySelectorAll('.exp-titre, .exp-entreprise, .exp-periode, .exp-desc').forEach(el => {
            el.removeEventListener('input', updateExp);
            el.addEventListener('input', updateExp);
        });
        document.querySelectorAll('.remove-item[data-type="exp"]').forEach(btn => btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.index); if(!isNaN(idx)) { experiences.splice(idx,1); renderExpForm(); renderPreview(); } }));
    }
    function updateExp(e) { let idx = parseInt(e.target.dataset.index); if(!isNaN(idx) && experiences[idx]) { experiences[idx][e.target.dataset.field] = e.target.value; renderPreview(); } }
    function renderEduForm() {
        const container = document.getElementById('eduContainer');
        container.innerHTML = '';
        formations.forEach((edu, idx) => {
            let div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<button class="remove-item" data-type="edu" data-index="${idx}"><i class="fas fa-trash-alt"></i></button>
                <div class="form-group"><label>Diplôme</label><input class="edu-diplome" value="${escapeHtml(edu.diplome)}" data-index="${idx}" data-field="diplome" placeholder="Diplôme"></div>
                <div class="form-group"><label>Établissement</label><input class="edu-etablissement" value="${escapeHtml(edu.etablissement)}" data-index="${idx}" data-field="etablissement" placeholder="Établissement"></div>
                <div class="form-group"><label>Année</label><input class="edu-annee" value="${escapeHtml(edu.annee)}" data-index="${idx}" data-field="annee" placeholder="Année"></div>`;
            container.appendChild(div);
        });
        attachEduEvents();
    }
    function attachEduEvents() {
        document.querySelectorAll('.edu-diplome, .edu-etablissement, .edu-annee').forEach(el => {
            el.removeEventListener('input', updateEdu);
            el.addEventListener('input', updateEdu);
        });
        document.querySelectorAll('.remove-item[data-type="edu"]').forEach(btn => btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.index); if(!isNaN(idx)) { formations.splice(idx,1); renderEduForm(); renderPreview(); } }));
    }
    function updateEdu(e) { let idx = parseInt(e.target.dataset.index); if(!isNaN(idx) && formations[idx]) { formations[idx][e.target.dataset.field] = e.target.value; renderPreview(); } }

    function addExperience() { experiences.push({titre: "", entreprise: "", periode: "", description: ""}); renderExpForm(); renderPreview(); }
    function addEducation() { formations.push({diplome: "", etablissement: "", annee: ""}); renderEduForm(); renderPreview(); }

    function bindInputs() {
        const ids = ['fullname','phone','email','location','permis','website','stageTitle','stageStart','stageEnd','stagePoste','competencesInput','langues','loisirs','hideWebsiteCheckbox'];
        ids.forEach(id => { let el = document.getElementById(id); if(el) el.addEventListener('input', renderPreview); });
        document.getElementById('hideWebsiteCheckbox').addEventListener('change', renderPreview);
    }

    async function downloadPDF() {
        const element = document.getElementById('resumeCard');
        if (!element) return;
        const btn = document.getElementById('downloadPDFBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ...';
        btn.disabled = true;
        try {
            const origPadding = element.style.padding;
            const origMargin = element.style.margin;
            element.style.padding = '0';
            element.style.margin = '0';
            const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            element.style.padding = origPadding;
            element.style.margin = origMargin;
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            const pageW = 210;
            const pageH = 297;
            const imgW = pageW;
            const imgH = (canvas.height * imgW) / canvas.width;
            if (imgH > pageH) {
                const ratio = pageH / imgH;
                pdf.addImage(canvas, 'PNG', (pageW - imgW * ratio) / 2, 0, imgW * ratio, pageH);
            } else {
                pdf.addImage(canvas, 'PNG', 0, 0, imgW, imgH);
            }
            pdf.save(`CV_${currentLang}.pdf`);
        } catch(e) { alert('Erreur PDF: '+e); }
        finally { btn.innerHTML = originalText; btn.disabled = false; }
    }

    function setLanguage(lang) {
        currentLang = lang;
        updateUILabels();
        renderPreview();
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    }

    document.getElementById('photoUpload').addEventListener('change', e => {
        if(e.target.files[0]) { const reader = new FileReader(); reader.onload = ev => { photoBase64 = ev.target.result; renderPreview(); }; reader.readAsDataURL(e.target.files[0]); }
    });
    document.getElementById('addExpBtn').onclick = addExperience;
    document.getElementById('addEduBtn').onclick = addEducation;
    document.getElementById('downloadPDFBtn').onclick = downloadPDF;
    document.getElementById('zoomInBtn').onclick = zoomIn;
    document.getElementById('zoomOutBtn').onclick = zoomOut;
    document.getElementById('zoomResetBtn').onclick = zoomReset;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.onclick = () => setLanguage(btn.dataset.lang));
    bindInputs();
    renderExpForm();
    renderEduForm();
    setLanguage('fr');
</script>
</body>
</html>
