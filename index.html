<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CV - Pavlo Pashkin | Deux colonnes | PDF A4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef2f8; font-family: 'Inter', sans-serif; padding: 1rem; }
        .app-wrapper { max-width: 1400px; margin: 0 auto; }
        .lang-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { background: white; border: 1px solid #dce5ef; padding: 6px 16px; border-radius: 40px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .lang-btn.active { background: #1f4a6e; color: white; border-color: #1f4a6e; }
        .builder-grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .editor-panel { flex: 1.2; min-width: 280px; background: white; border-radius: 28px; padding: 20px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 25px -12px rgba(0,0,0,0.1); }
        .editor-panel h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: #1f4870; }
        .form-group { margin-bottom: 16px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.8rem; color: #2c3e4e; }
        input, textarea { width: 100%; padding: 10px 14px; border-radius: 20px; border: 1px solid #cfdfed; font-family: inherit; font-size: 0.85rem; }
        .inline-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .inline-row .form-group { flex: 1; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
        .btn-add { background: #eff3f8; border: 1px dashed #8ba3bc; padding: 5px 14px; border-radius: 40px; font-size: 0.75rem; cursor: pointer; }
        .array-item { background: #fafcff; padding: 12px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #e9f0f5; position: relative; }
        .remove-item { background: none; border: none; color: #c0392b; cursor: pointer; float: right; }
        .preview-panel { flex: 1.8; min-width: 340px; background: white; border-radius: 28px; box-shadow: 0 10px 25px -12px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .preview-header { padding: 12px 20px; background: white; border-bottom: 1px solid #eef3fa; display: flex; justify-content: flex-end; align-items: center; }
        .btn-pdf { background: #1f4870; border: none; padding: 8px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .cv-card { padding: 0; margin: 0; background: white; }
        /* СТРУКТУРА CV (точно как на вашем скриншоте) */
        .cv-paper { max-width: 100%; background: white; font-family: 'Inter', sans-serif; }
        .cv-header { display: flex; align-items: center; gap: 25px; padding: 25px 30px; background: #f8fbfe; border-bottom: 3px solid #2a6f6f; }
        .cv-photo { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #2a6f6f; background: white; }
        .cv-name { font-size: 2rem; font-weight: 800; color: #1f4870; }
        .cv-two-columns { display: flex; }
        .cv-left { width: 34%; background: #fafcff; padding: 25px 20px; border-right: 1px solid #e2edf5; }
        .cv-right { width: 66%; padding: 25px 25px; }
        .cv-left-title { font-weight: 800; font-size: 1.1rem; color: #1f4870; border-bottom: 2px solid #2a6f6f; display: inline-block; margin: 0 0 15px 0; letter-spacing: 1px; }
        .cv-contact { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-size: 0.85rem; color: #1e2a3a; }
        .cv-contact i { width: 24px; color: #2a6f6f; font-size: 1rem; }
        .cv-text { font-size: 0.85rem; line-height: 1.4; margin-bottom: 12px; }
        .cv-section-title { font-weight: 800; font-size: 1rem; color: #1f4a6e; border-left: 4px solid #2a6f6f; padding-left: 12px; margin: 0 0 12px 0; }
        .cv-stage { background: #eef3fa; padding: 12px 18px; border-radius: 20px; text-align: center; margin-bottom: 25px; }
        .cv-stage strong { font-size: 1rem; }
        .cv-stage p { margin: 5px 0; }
        .cv-skills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .cv-skill { background: #e6f0f5; padding: 5px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 500; }
        .cv-job { margin-bottom: 18px; }
        .cv-job-title { font-weight: 700; font-size: 0.85rem; display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 5px; }
        .cv-job-date { font-weight: 400; color: #5f7d9c; font-size: 0.75rem; }
        .cv-job-desc { font-size: 0.75rem; color: #2c4a6e; line-height: 1.35; }
        .cv-edu { margin-bottom: 14px; }
        .cv-edu-title { font-weight: 700; font-size: 0.85rem; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .cv-edu-date { font-weight: 400; color: #5f7d9c; font-size: 0.75rem; }
        .cv-edu-place { font-size: 0.75rem; color: #4a627a; margin-top: 2px; }
        @media (max-width: 700px) { .cv-two-columns { flex-direction: column; } .cv-left, .cv-right { width: 100%; } }
        .creator-credit { position: fixed; bottom: 15px; right: 15px; background: rgba(31,72,112,0.85); backdrop-filter: blur(8px); padding: 4px 12px; border-radius: 30px; color: white; font-size: 0.7rem; z-index: 1000; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="lang-bar">
        <button class="lang-btn" data-lang="fr">🇫🇷 Français</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        <button class="lang-btn" data-lang="uk">🇺🇦 Українська</button>
        <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
        <button class="lang-btn" data-lang="ar">🇸🇦 العربية</button>
        <button class="lang-btn" data-lang="prs">🇦🇫 دری</button>
    </div>
    <div class="builder-grid">
        <div class="editor-panel">
            <h3>✎ Редактор</h3>
            <div class="form-group"><label>📷 Фото</label><input type="file" id="photoUpload"></div>
            <div class="form-group"><label>Имя</label><input type="text" id="fullname" value="Pavlo Pashkin"></div>
            <div class="inline-row"><div class="form-group"><label>Телефон</label><input type="text" id="phone" value="07 45 62 50 07"></div><div class="form-group"><label>Email</label><input type="email" id="email" value="contact@paulmultiservice.fr"></div></div>
            <div class="inline-row"><div class="form-group"><label>Адрес</label><input type="text" id="location" value="Rennes, France"></div><div class="form-group"><label>Права</label><input type="text" id="permis" value="Permis B, Véhicule"></div></div>
            <div class="form-group"><label>Сайт</label><input type="text" id="website" value="paulmultiservice.fr"></div>
            <div class="checkbox-group"><input type="checkbox" id="hideWebsite"> <label>Скрыть сайт</label></div>
            <hr>
            <div class="form-group"><label>Цель стажировки</label><input type="text" id="stageTitle" value="Recherche un stage"></div>
            <div class="inline-row"><div class="form-group"><label>Дата начала</label><input type="text" id="stageStart" value="29/06/2026"></div><div class="form-group"><label>Дата конца</label><input type="text" id="stageEnd" value="17/07/2026"></div></div>
            <div class="form-group"><label>Должность</label><input type="text" id="stagePoste" value="Stagiaire CLPS"></div>
            <hr>
            <div class="form-group"><label>Компетенции (через запятую)</label><textarea id="competencesInput" rows="3">Petit bricolage, Maintenance technique, Conseil informatique, Assistance technique, Gestion des flux logistiques, Développement Web (HTML/Java), Pack Office (Excel avancé), Maintenance PC/Mac/iPhone, Management d'équipe, Gestion de crise</textarea></div>
            <div class="array-header"><label>Опыт работы</label><button class="btn-add" id="addExpBtn">+ Добавить</button></div>
            <div id="expContainer"></div>
            <div class="array-header"><label>Образование</label><button class="btn-add" id="addEduBtn">+ Добавить</button></div>
            <div id="eduContainer"></div>
            <hr>
            <div class="form-group"><label>Языки</label><input type="text" id="langues" value="Ukrainien (maternel), Russe (bilingue), Français (A2-B1)"></div>
            <div class="form-group"><label>Хобби</label><input type="text" id="loisirs" value="Football, Boxe, Handball, Nouvelles technologies"></div>
        </div>
        <div class="preview-panel">
            <div class="preview-header">
                <button class="btn-pdf" id="downloadPDFBtn"><i class="fas fa-download"></i> PDF (A4)</button>
            </div>
            <div class="cv-card" id="resumeCard"><div id="resumeContent"></div></div>
        </div>
    </div>
    <div class="creator-credit">Pavlo Pashkin</div>
</div>

<script>
    let experiences = [
        { titre: "Chef d'Entreprise - PaulMultiService", entreprise: "Rennes", periode: "02/2026 - En cours", description: "Conseil informatique, assistance technique, petit bricolage. Développement du site paulmultiservice.fr. Gestion administrative et client." },
        { titre: "Officier Logisticien - Chef de Bureau des Transports", entreprise: "Service des Transports Militaires (Ukraine)", periode: "2023-2024", description: "Planification des flux de transport, management d'unité, gestion de crise." },
        { titre: "Élève-officier / Cadet Logisticien", entreprise: "Académie Militaire / Forces Armées", periode: "2019-2023", description: "Formation commandement, logistique, gestion des transports, management d'équipe." },
        { titre: "Formation militaire opérationnelle", entreprise: "Forces Armées de l'Ukraine", periode: "2018-2019", description: "Sécurisation, protection des infrastructures, déploiement en zone de combat (ATO/OOS). Statut d'Ancien Combattant." }
    ];
    let formations = [
        { diplome: "Formation Prépa Avenir FL", etablissement: "CLPS Rennes", annee: "2026 (En cours)" },
        { diplome: "Licence (Bac+3) - Technologies de Transport", etablissement: "Université d'État des Sciences et Technologies d'Ukraine", annee: "2023 (Mention / Diplôme Rouge)" },
        { diplome: "Diplôme Professionnel – Opérateur Informatique & Comptabilité", etablissement: "Collège Professionnel - Université Nationale de l'Aviation", annee: "2016" }
    ];
    let photoBase64 = "";
    let currentLang = "fr";

    const texts = {
        fr: { contact:"Coordonnées", langues:"Langues", loisirs:"Loisirs", comp:"COMPÉTENCES", exp:"EXPÉRIENCES PROFESSIONNELLES", edu:"FORMATIONS / DIPLÔMES" },
        en: { contact:"Contact", langues:"Languages", loisirs:"Hobbies", comp:"SKILLS", exp:"WORK EXPERIENCE", edu:"EDUCATION / DEGREES" },
        uk: { contact:"Контакти", langues:"Мови", loisirs:"Хобі", comp:"НАВИЧКИ", exp:"ДОСВІД РОБОТИ", edu:"ОСВІТА / ДИПЛОМИ" },
        ru: { contact:"Контакты", langues:"Языки", loisirs:"Хобби", comp:"НАВЫКИ", exp:"ОПЫТ РАБОТЫ", edu:"ОБРАЗОВАНИЕ / ДИПЛОМЫ" },
        ar: { contact:"معلومات الاتصال", langues:"اللغات", loisirs:"الهوايات", comp:"المهارات", exp:"الخبرات المهنية", edu:"التعليم / الشهادات" },
        prs: { contact:"اطلاعات تماس", langues:"زبان‌ها", loisirs:"سرگرمی‌ها", comp:"مهارت‌ها", exp:"تجارب کاری", edu:"تحصیلات / دیپلم‌ها" }
    };

    function renderPreview() {
        const t = texts[currentLang];
        const nom = document.getElementById('fullname').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const adresse = document.getElementById('location').value;
        const permis = document.getElementById('permis').value;
        let website = document.getElementById('website').value;
        if(document.getElementById('hideWebsite').checked) website = "";
        const stageTitle = document.getElementById('stageTitle').value;
        const stageStart = document.getElementById('stageStart').value;
        const stageEnd = document.getElementById('stageEnd').value;
        const stagePoste = document.getElementById('stagePoste').value;
        const competences = document.getElementById('competencesInput').value.split(',').map(s=>s.trim()).filter(s=>s);
        const langues = document.getElementById('langues').value;
        const loisirs = document.getElementById('loisirs').value;

        let html = `<div class="cv-paper">`;
        // Header
        html += `<div class="cv-header">`;
        if(photoBase64) html += `<img src="${photoBase64}" class="cv-photo">`;
        else html += `<div class="cv-photo" style="background:#eef2f8; display:flex; align-items:center; justify-content:center;">📷</div>`;
        html += `<div class="cv-name">${escapeHtml(nom) || "Nom"}</div>`;
        html += `</div>`;
        // Two columns
        html += `<div class="cv-two-columns">`;
        // Left column
        html += `<div class="cv-left">`;
        html += `<div class="cv-left-title">${t.contact}</div>`;
        if(phone) html += `<div class="cv-contact"><i class="fas fa-phone-alt"></i> ${escapeHtml(phone)}</div>`;
        if(email) html += `<div class="cv-contact"><i class="fas fa-envelope"></i> ${escapeHtml(email)}</div>`;
        if(adresse) html += `<div class="cv-contact"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(adresse)}</div>`;
        if(permis) html += `<div class="cv-contact"><i class="fas fa-car"></i> ${escapeHtml(permis)}</div>`;
        if(website) html += `<div class="cv-contact"><i class="fas fa-globe"></i> ${escapeHtml(website)}</div>`;
        if(langues) {
            html += `<div class="cv-left-title">${t.langues}</div>`;
            html += `<div class="cv-text">${escapeHtml(langues)}</div>`;
        }
        if(loisirs) {
            html += `<div class="cv-left-title">${t.loisirs}</div>`;
            html += `<div class="cv-text">${escapeHtml(loisirs)}</div>`;
        }
        html += `</div>`;
        // Right column
        html += `<div class="cv-right">`;
        html += `<div class="cv-stage"><strong>${escapeHtml(stageTitle) || "Stage"}</strong><p>Du ${escapeHtml(stageStart)} au ${escapeHtml(stageEnd)}</p><p><strong>${escapeHtml(stagePoste) || "Poste"}</strong></p></div>`;
        if(competences.length) {
            html += `<div class="cv-section-title">${t.comp}</div><div class="cv-skills">`;
            competences.forEach(c => html += `<span class="cv-skill">${escapeHtml(c)}</span>`);
            html += `</div>`;
        }
        if(experiences.length) {
            html += `<div class="cv-section-title">${t.exp}</div>`;
            experiences.forEach(exp => {
                html += `<div class="cv-job"><div class="cv-job-title"><span>${escapeHtml(exp.titre)} - ${escapeHtml(exp.entreprise)}</span><span class="cv-job-date">${escapeHtml(exp.periode)}</span></div>`;
                if(exp.description) html += `<div class="cv-job-desc">${escapeHtml(exp.description)}</div>`;
                html += `</div>`;
            });
        }
        if(formations.length) {
            html += `<div class="cv-section-title">${t.edu}</div>`;
            formations.forEach(edu => {
                html += `<div class="cv-edu"><div class="cv-edu-title"><span>${escapeHtml(edu.diplome)}</span><span class="cv-edu-date">${escapeHtml(edu.annee)}</span></div>`;
                if(edu.etablissement) html += `<div class="cv-edu-place">${escapeHtml(edu.etablissement)}</div>`;
                html += `</div>`;
            });
        }
        html += `</div></div></div>`;
        document.getElementById('resumeContent').innerHTML = html;
    }

    function escapeHtml(s) { return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    function renderExpForm() {
        const container = document.getElementById('expContainer');
        container.innerHTML = '';
        experiences.forEach((exp, idx) => {
            let div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<button class="remove-item" data-type="exp" data-index="${idx}">🗑️</button>
                <div class="form-group"><label>Titre</label><input class="exp-titre" value="${escapeHtml(exp.titre)}" data-index="${idx}" data-field="titre"></div>
                <div class="form-group"><label>Entreprise</label><input class="exp-entreprise" value="${escapeHtml(exp.entreprise)}" data-index="${idx}" data-field="entreprise"></div>
                <div class="form-group"><label>Période</label><input class="exp-periode" value="${escapeHtml(exp.periode)}" data-index="${idx}" data-field="periode"></div>
                <div class="form-group"><label>Description</label><textarea class="exp-desc" data-index="${idx}" data-field="description" rows="2">${escapeHtml(exp.description)}</textarea></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.exp-titre, .exp-entreprise, .exp-periode, .exp-desc').forEach(el => el.addEventListener('input', updateExp));
        document.querySelectorAll('.remove-item[data-type="exp"]').forEach(btn => btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.index); experiences.splice(idx,1); renderExpForm(); renderPreview(); }));
    }
    function updateExp(e) { let idx = e.target.dataset.index, field = e.target.dataset.field; if(experiences[idx]) { experiences[idx][field] = e.target.value; renderPreview(); } }
    function renderEduForm() {
        const container = document.getElementById('eduContainer');
        container.innerHTML = '';
        formations.forEach((edu, idx) => {
            let div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<button class="remove-item" data-type="edu" data-index="${idx}">🗑️</button>
                <div class="form-group"><label>Diplôme</label><input class="edu-diplome" value="${escapeHtml(edu.diplome)}" data-index="${idx}" data-field="diplome"></div>
                <div class="form-group"><label>Établissement</label><input class="edu-etablissement" value="${escapeHtml(edu.etablissement)}" data-index="${idx}" data-field="etablissement"></div>
                <div class="form-group"><label>Année</label><input class="edu-annee" value="${escapeHtml(edu.annee)}" data-index="${idx}" data-field="annee"></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.edu-diplome, .edu-etablissement, .edu-annee').forEach(el => el.addEventListener('input', updateEdu));
        document.querySelectorAll('.remove-item[data-type="edu"]').forEach(btn => btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.index); formations.splice(idx,1); renderEduForm(); renderPreview(); }));
    }
    function updateEdu(e) { let idx = e.target.dataset.index, field = e.target.dataset.field; if(formations[idx]) { formations[idx][field] = e.target.value; renderPreview(); } }

    function addExperience() { experiences.push({titre:"", entreprise:"", periode:"", description:""}); renderExpForm(); renderPreview(); }
    function addEducation() { formations.push({diplome:"", etablissement:"", annee:""}); renderEduForm(); renderPreview(); }

    function bindInputs() {
        ['fullname','phone','email','location','permis','website','stageTitle','stageStart','stageEnd','stagePoste','competencesInput','langues','loisirs','hideWebsite'].forEach(id => {
            document.getElementById(id).addEventListener('input', renderPreview);
        });
    }

    async function downloadPDF() {
        const el = document.getElementById('resumeCard');
        const btn = document.getElementById('downloadPDFBtn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        btn.disabled = true;
        try {
            el.style.padding = '0'; el.style.margin = '0';
            const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            el.style.padding = ''; el.style.margin = '';
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
            const pageW = 210, pageH = 297;
            const imgW = pageW;
            const imgH = (canvas.height * imgW) / canvas.width;
            if(imgH > pageH) {
                const ratio = pageH / imgH;
                pdf.addImage(canvas, 'PNG', (pageW - imgW*ratio)/2, 0, imgW*ratio, pageH);
            } else {
                pdf.addImage(canvas, 'PNG', 0, 0, imgW, imgH);
            }
            pdf.save('CV_Pavlo_Pashkin.pdf');
        } catch(e) { alert('PDF error: '+e); }
        finally { btn.innerHTML = orig; btn.disabled = false; }
    }

    function setLanguage(lang) { currentLang = lang; renderPreview(); document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang)); }

    document.getElementById('photoUpload').addEventListener('change', e => {
        if(e.target.files[0]) { const reader = new FileReader(); reader.onload = ev => { photoBase64 = ev.target.result; renderPreview(); }; reader.readAsDataURL(e.target.files[0]); }
    });
    document.getElementById('addExpBtn').onclick = addExperience;
    document.getElementById('addEduBtn').onclick = addEducation;
    document.getElementById('downloadPDFBtn').onclick = downloadPDF;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.onclick = () => setLanguage(btn.dataset.lang));
    bindInputs();
    renderExpForm();
    renderEduForm();
    setLanguage('fr');
</script>
</body>
</html>
